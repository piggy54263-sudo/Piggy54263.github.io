<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boi</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* STARS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none; /* IMPORTANT FIX */
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.8;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(100vh); }
}

/* LOGO */
.logo {
  display: block;
  margin: 30px auto 10px;
  width: 90px;
  height: 90px;
  border-radius: 18px;
  box-shadow: 0 0 20px purple;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 45px;
  color: purple;
  text-shadow:
    0 0 5px purple,
    0 0 10px purple,
    0 0 25px #b300ff,
    0 0 40px #b300ff;
  margin: 10px 0 30px;
}

/* SHORTCUTS */
.shortcuts {
  text-align: center;
  font-size: 20px;
  line-height: 2.5;
}

.shortcuts a {
  color: white;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.shortcuts a:hover {
  color: purple;
  text-shadow: 0 0 10px purple;
}

/* ICONS */
.icon {
  width: 20px;
  height: 20px;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<img class="logo" src="logo.png" alt="logo">

<div class="title">Boi</div>

<div class="shortcuts">

  <div>
    <a href="https://youtube.com" target="_blank">
      <img class="icon" src="https://www.google.com/s2/favicons?domain=youtube.com">
      YouTube
    </a>
  </div>

  <div>
    <a href="https://google.com" target="_blank">
      <img class="icon" src="https://www.google.com/s2/favicons?domain=google.com">
      Google
    </a>
  </div>

  <div>
    <a href="https://discord.com" target="_blank">
      <img class="icon" src="https://www.google.com/s2/favicons?domain=discord.com">
      Discord
    </a>
  </div>

  <div>
    <a href="https://github.com" target="_blank">
      <img class="icon" src="https://www.google.com/s2/favicons?domain=github.com">
      GitHub
    </a>
  </div>

</div>

<script>
const stars = document.getElementById("stars");

for (let i = 0; i < 80; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  s.style.animationDuration = (2 + Math.random() * 5) + "s";
  stars.appendChild(s);
}
</script>

</body>
</html>
