<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cosmos | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #000; 
            color: #00d4ff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Star Background */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Middle-Left Nav (Games/Movies) */
        .side-nav {
            position: fixed;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .side-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            text-align: center;
            width: 60px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .side-btn:hover {
            box-shadow: 0 0 15px #00d4ff;
            background: #00d4ff;
            color: #000;
        }

        /* The Constellations (Lore Stars) */
        .star-point {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #00d4ff;
            animation: twinkle 2s infinite ease-in-out;
        }

        .star-label {
            position: absolute;
            color: #fff;
            font-size: 0.65rem;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: translateY(10px);
            opacity: 0.7;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; box-shadow: 0 0 25px #00d4ff; }
        }

        /* Center Hub */
        .hub-container {
            text-align: center;
            z-index: 10;
        }

        h1 { 
            font-size: 4rem; 
            letter-spacing: 15px; 
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 40px;
        }

        .btn-main {
            background: #00d4ff;
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
            display: inline-block;
            margin: 10px;
        }

        .btn-main:hover {
            background: #fff;
            box-shadow: 0 0 30px #fff;
        }

        .calc-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #fff;
            color: #fff;
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <nav class="side-nav">
        <a href="games.html" class="side-btn"><i class="fa-solid fa-gamepad"></i>GAMES</a>
        <a href="movies.html" class="side-btn"><i class="fa-solid fa-film"></i>MOVIES</a>
    </nav>

    <div style="position: absolute; top: 20%; left: 70%;">
        <div class="star-point"></div>
        <div class="star-label">Chicken Bake's Dipper</div>
    </div>

    <div style="position: absolute; top: 60%; left: 80%;">
        <div class="star-point"></div>
        <div class="star-label">Barry's Cluster</div>
    </div>

    <div style="position: absolute; top: 15%; left: 15%;">
        <div class="star-point"></div>
        <div class="star-label">The Jhoey Nebula</div>
    </div>

    <div style="position: absolute; top: 75%; left: 20%;">
        <div class="star-point"></div>
        <div class="star-label">Santi's North Star</div>
    </div>

    <div class="hub-container">
        <h1>THE COSMOS</h1>
        <a href="luke-ai.html" class="btn-main">ENTER LUKE AI</a>
        <br>
        <a href="calculator.html" class="btn-main calc-btn">CALCULATOR</a>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let stars = [];
        for(let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
