<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke AI | Home Base</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #050505; 
            color: #00d4ff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* Middle-Left Sidebar (Small & Discrete) */
        .sidebar {
            position: fixed;
            left: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        /* Tiny Sidebar Buttons */
        .side-btn {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 0.65rem; /* Extra small for that stealth look */
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            flex-direction: column; /* Icon on top of text */
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 60px; /* Slim width */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .side-btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 25px #00d4ff;
            transform: scale(1.1) translateX(5px);
        }

        /* Center Main Card */
        .main-card {
            background: linear-gradient(145deg, #0a0a0a, #111);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid #222;
            text-align: center;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 1);
            position: relative;
        }

        h1 { 
            font-size: 3.5rem; 
            letter-spacing: 12px; 
            margin: 0; 
            background: linear-gradient(to bottom, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lore-text {
            color: #555;
            font-size: 0.8rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* The Big "Enter" Button */
        .enter-btn {
            background: #00d4ff;
            color: #000;
            padding: 18px 45px;
            border-radius: 15px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.4s ease;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .enter-btn:hover {
            background: #fff;
            box-shadow: 0 0 40px #fff;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="games.html" class="side-btn">
            <i class="fa-solid fa-gamepad fa-lg"></i>
            <span>Games</span>
        </a>
        <a href="movies.html" class="side-btn">
            <i class="fa-solid fa-film fa-lg"></i>
            <span>Movies</span>
        </a>
    </nav>

    <div class="main-card">
        <h1>LUKE AI</h1>
        <p class="lore-text">Chicken Bake Drake • Barry • Jhoey • Santi</p>
        <a href="luke-ai.html" class="enter-btn">Wake the Brain</a>
    </div>

</body>
</html>
