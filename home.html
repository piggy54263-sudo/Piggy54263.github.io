<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Space Portfolio</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 200%;
            z-index: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .stars-container::after, .stars-container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 20% 50%, #fff, transparent),
                radial-gradient(2px 2px at 90% 80%, #fff, transparent);
            background-size: 400px 400px;
            animation: starLoop 60s linear infinite;
            opacity: 0.5;
        }

        .stars-container::before { top: 50%; }

        @keyframes starLoop {
            from { transform: translateY(0); }
            to { transform: translateY(-100%); }
        }

        .main-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%; gap: 2.5rem;
        }

        h1 {
            font-size: 2.5rem; font-weight: 200; letter-spacing: 0.5rem;
            text-transform: uppercase; margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .button-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem; width: 90%; max-width: 800px;
        }

        .nav-btn {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 2rem 1rem; color: white;
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.8rem; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 4px;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
        }

        #modalOverlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100; flex-direction: column;
        }

        .modal-header { padding: 1rem; display: flex; justify-content: flex-end; }

        .close-btn {
            background: none; border: 1px solid white;
            color: white; padding: 0.5rem 1rem; cursor: pointer;
        }

        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }

        @media (max-width: 600px) {
            .button-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="stars-container"></div>

    <main class="main-wrapper">
        <header><h1>CONSTELLATION</h1></header>
        <section class="button-grid">
            <button class="nav-btn" onclick="openModal('https://example.com')">Projects</button>
            <button class="nav-btn" onclick="openModal('https://example.com')">About</button>
            <button class="nav-btn" onclick="openModal('https://example.com')">Contact</button>
            <button class="nav-btn" onclick="openModal('https://example.com')">Lab</button>
            <button class="nav-btn" onclick="openModal('https://example.com')">Archive</button>
            <button class="nav-btn" onclick="openModal('https://example.com')">Docs</button>
        </section>
    </main>

    <div id="modalOverlay">
        <div class="modal-header">
            <button class="close-btn" onclick="closeModal()">CLOSE [X]</button>
        </div>
        <iframe id="contentFrame" src=""></iframe>
    </div>

    <script>
        const modal = document.getElementById('modalOverlay');
        const iframe = document.getElementById('contentFrame');

        function openModal(url) {
            iframe.src = url;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            iframe.src = '';
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
