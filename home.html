<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
  }

  /* STAR BACKGROUND */
  .stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  .stars::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveStars 60s linear infinite;
    opacity: 0.15;
  }

  @keyframes moveStars {
    from { transform: translateY(0); }
    to { transform: translateY(-500px); }
  }

  /* MAIN UI */
  .container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
  }

  h1 {
    font-size: 40px;
    letter-spacing: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 140px);
    gap: 15px;
  }

  button {
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    transition: 0.2s;
    backdrop-filter: blur(8px);
  }

  button:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.05);
  }

  /* POPUP */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 10;
    justify-content: center;
    align-items: center;
  }

  .modal iframe {
    width: 90%;
    height: 85%;
    border: none;
    border-radius: 12px;
  }

  .close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h1>My Home</h1>

  <div class="grid">
    <button onclick="openSite('https://www.youtube.com/embed/dQw4w9WgXcQ')">
      YouTube
    </button>

    <button onclick="openSite('https://example.com')">
      Site 2
    </button>

    <button onclick="openSite('https://example.com')">
      Site 3
    </button>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="closeSite()">✖</span>
  <iframe id="frame"></iframe>
</div>

<script>
  function openSite(url) {
    document.getElementById("frame").src = url;
    document.getElementById("modal").style.display = "flex";
  }

  function closeSite() {
    document.getElementById("frame").src = "";
    document.getElementById("modal").style.display = "none";
  }
</script>

</body>
</html>
