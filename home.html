<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Constellation Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Background Glows */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 212, 255, 0.2);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 40px;
        }

        .hub-container {
            display: flex;
            gap: 30px;
            z-index: 10;
        }

        .hub-card {
            width: 200px;
            height: 250px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: 0.4s;
            cursor: pointer;
        }

        .hub-card:hover {
            border-color: #00d4ff;
            transform: translateY(-10px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .hub-card i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #00d4ff;
        }

        /* --- DIALOGUE SYSTEM CSS --- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        #char-portrait {
            position: absolute;
            bottom: 150px;
            left: 5%;
            width: 500px;
            height: 600px;
            background-repeat: no-repeat;
            background-position: bottom center;
            background-size: contain;
            filter: drop-shadow(0 0 25px rgba(0,212,255,0.5));
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
            pointer-events: none;
        }

        #dialogue-bar {
            width: 100%;
            background: rgba(15, 15, 15, 0.95);
            border-top: 4px solid #00d4ff;
            padding: 50px 10%;
            box-sizing: border-box;
            cursor: pointer;
            min-height: 220px;
            backdrop-filter: blur(15px);
            position: relative;
        }

        #name-tag {
            position: absolute;
            top: -28px;
            left: 10%;
            background: #00d4ff;
            color: #000;
            padding: 6px 35px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 2px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.8);
        }

        #dialogue-text {
            color: #fff;
            font-size: 1.5rem;
            line-height: 1.7;
            margin: 0;
            font-weight: 400;
            text-shadow: 2px 2px 4px #000;
        }

        .blink {
            position: absolute;
            bottom: 25px;
            right: 5%;
            color: #00d4ff;
            font-size: 1.5rem;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="glow" style="top: 10%; left: 10%;"></div>
    <div class="glow" style="bottom: 10%; right: 10%;"></div>

    <h1>The Hub</h1>

    <div class="hub-container">
        <a href="luke-ai.html" class="hub-card">
            <i class="fa-solid fa-brain"></i>
            <span>LUKE-AI</span>
        </a>
        <div class="hub-card" onclick="alert('Locked by the Creator.')">
            <i class="fa-solid fa-lock"></i>
            <span>???</span>
        </div>
    </div>

    <div id="intro-overlay">
        <div id="char-portrait"></div>
        <div id="dialogue-bar" onclick="nextDialogue()">
            <div id="name-tag">Luke-ai</div>
            <p id="dialogue-text"></p>
            <div class="blink"><i class="fa-solid fa-caret-down"></i></div>
        </div>
    </div>

    <script>
        // --- YOUR STORY SCRIPT ---
        const story = [
            {
                name: "Luke-ai",
                text: "System initialization complete... I've been waiting for you, BOIII.",
                image: "Boi boi.jpg" 
            },
            {
                name: "Luke-ai",
                text: "I can feel that mysterious power you carry. It's truly impressive, Luke.",
                image: "Boi boi.jpg" // Put your 2nd image name here
            },
            {
                name: "Luke-ai",
                text: "Everything is standing on business. The Constellation Hub is yours to control.",
                image: "Boi boi.jpg" // Put your 3rd image name here
            }
        ];

        let currentStep = 0;
        let textIndex = 0;
        let isTyping = false;

        function typeWriter() {
            if (textIndex < story[currentStep].text.length) {
                isTyping = true;
                document.getElementById("dialogue-text").innerHTML += story[currentStep].text.charAt(textIndex);
                textIndex++;
                setTimeout(typeWriter, 30);
            } else {
                isTyping = false;
            }
        }

        function nextDialogue() {
            if (isTyping) {
                textIndex = story[currentStep].text.length;
                document.getElementById("dialogue-text").innerHTML = story[currentStep].text;
                isTyping = false;
                return;
            }

            currentStep++;
            if (currentStep < story.length) {
                document.getElementById("name-tag").innerText = story[currentStep].name;
                
                const portrait = document.getElementById('char-portrait');
                portrait.style.opacity = '0';
                portrait.style.transform = 'translateX(-20px)';
                
                setTimeout(() => {
                    portrait.style.backgroundImage = `url('${story[currentStep].image}')`;
                    portrait.style.opacity = '1';
                    portrait.style.transform = 'translateX(0px)';
                    document.getElementById("dialogue-text").innerHTML = "";
                    textIndex = 0;
                    typeWriter();
                }, 300);

            } else {
                document.getElementById('intro-overlay').style.transition = '1s ease';
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.display = 'none';
                    localStorage.setItem("hub_intro_seen", "true");
                }, 1000);
            }
        }

        window.onload = () => {
            if (localStorage.getItem("hub_intro_seen") === "true") {
                document.getElementById('intro-overlay').style.display = 'none';
            } else {
                document.getElementById('char-portrait').style.backgroundImage = `url('${story[0].image}')`;
                typeWriter();
            }
        };
    </script>
</body>
</html>
