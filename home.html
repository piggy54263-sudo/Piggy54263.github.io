<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Space Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* --- Animated Background --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 200%;
            z-index: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .stars-container::after, .stars-container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background-image: 
                radial-gradient(1px 1px at 15% 15%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 40% 70%, #fff, transparent),
                radial-gradient(2px 2px at 80% 30%, #fff, transparent);
            background-size: 400px 400px;
            animation: starLoop 80s linear infinite;
            opacity: 0.4;
        }

        .stars-container::before { top: 50%; }

        @keyframes starLoop {
            from { transform: translateY(0); }
            to { transform: translateY(-100%); }
        }

        /* --- Layout --- */
        .main-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%; gap: 3rem;
        }

        h1 {
            font-size: 2rem; font-weight: 200; letter-spacing: 0.8rem;
            text-transform: uppercase; margin: 0;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* Grid for 2 items */
        .button-grid {
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem; width: 90%; max-width: 500px;
        }

        /* --- Icon Button Styling --- */
        .nav-btn {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 3rem 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .nav-btn i {
            font-size: 3rem; 
            transition: color 0.3s;
        }

        .nav-btn span {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .nav-btn:hover i { color: var(--accent); }
        .nav-btn:hover span { opacity: 1; color: var(--accent); }

        /* --- Modal System --- */
        #modalOverlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100; flex-direction: column;
        }

        .modal-header { padding: 1rem; display: flex; justify-content: flex-end; }

        .close-btn {
            background: none; border: 1px solid white;
            color: white; padding: 0.6rem 1.2rem; cursor: pointer;
            font-family: inherit; font-size: 0.8rem;
        }

        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; }

        @media (max-width: 500px) {
            .button-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="stars-container"></div>

    <main class="main-wrapper">
        <header>
            <h1>CONSTELLATION</h1>
        </header>

        <section class="button-grid">
            <button class="nav-btn" onclick="openModal('https://example.com/games')">
                <i class="fa-solid fa-gamepad"></i>
                <span>Games</span>
            </button>

            <button class="nav-btn" onclick="openModal('https://example.com/movies')">
                <i class="fa-solid fa-film"></i>
                <span>Movies</span>
            </button>
        </section>
    </main>

    <div id="modalOverlay">
        <div class="modal-header">
            <button class="close-btn" onclick="closeModal()">CLOSE [X]</button>
        </div>
        <iframe id="contentFrame" src="" title="Content View"></iframe>
    </div>

    <script>
        const modal = document.getElementById('modalOverlay');
        const iframe = document.getElementById('contentFrame');

        function openModal(url) {
            iframe.src = url;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            iframe.src = '';
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
