<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Space Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
            --ai-accent: #a855f7;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Background --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 200%;
            z-index: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .stars-container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background-image: radial-gradient(1px 1px at 15% 15%, #fff, transparent), 
                              radial-gradient(1.5px 1.5px at 40% 70%, #fff, transparent);
            background-size: 300px 300px;
            animation: starLoop 60s linear infinite;
        }
        @keyframes starLoop { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        /* --- Content Layout --- */
        .main-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%; gap: 2rem;
            padding: 20px; box-sizing: border-box;
        }

        h1 { font-size: 1.5rem; letter-spacing: 0.5rem; text-transform: uppercase; text-align: center; }

        /* --- The Flexible Grid --- */
        .button-grid {
            display: grid; 
            gap: 1.5rem; 
            width: 100%; 
            max-width: 800px;
            transition: all 0.5s ease;
        }

        /* PC Mode (Default) */
        .is-pc .button-grid { grid-template-columns: repeat(3, 1fr); }
        
        /* Mobile Mode */
        .is-mobile .button-grid { grid-template-columns: 1fr; }

        .nav-btn {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 2rem 1rem;
            color: white;
            cursor: pointer;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: 0.3s;
        }

        .nav-btn i { font-size: 2.5rem; }
        .nav-btn span { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }

        /* --- PC Hover Effects --- */
        .is-pc .nav-btn:hover {
            transform: scale(1.1);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        /* --- Modal --- */
        #modalOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; flex-direction: column;
        }
        .modal-header { padding: 10px; display: flex; justify-content: flex-end; background: #111; }
        .close-btn { background: var(--ai-accent); border: none; color: white; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        iframe { flex-grow: 1; border: none; }
    </style>
</head>
<body class="detecting">

    <div class="stars-container"></div>

    <main class="main-wrapper">
        <h1 id="mainTitle">CONSTELLATION</h1>
        <div id="deviceTag" style="font-size: 0.6rem; color: #555;">DETECTING SYSTEM...</div>

        <section class="button-grid">
            <button class="nav-btn" onclick="openModal('games.html')">
                <i class="fa-solid fa-gamepad"></i><span>Games</span>
            </button>
            <button class="nav-btn" style="border-color: var(--ai-accent);" onclick="openModal('luke-ai.html')">
                <i class="fa-solid fa-robot" style="color: var(--ai-accent);"></i><span>Luke AI</span>
            </button>
            <button class="nav-btn" onclick="openModal('movies.html')">
                <i class="fa-solid fa-film"></i><span>Movies</span>
            </button>
        </section>
    </main>

    <div id="modalOverlay">
        <div class="modal-header"><button class="close-btn" onclick="closeModal()">CLOSE [X]</button></div>
        <iframe id="contentFrame" src=""></iframe>
    </div>

    <script>
        // --- DEVICE DETECTION LOGIC ---
        function detectDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const body = document.body;
            const deviceTag = document.getElementById('deviceTag');

            // Regex check for mobile devices
            if (/android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent)) {
                body.classList.add('is-mobile');
                deviceTag.innerText = "MOBILE CORE ACTIVE";
                console.log("BOIII, you on a phone!");
            } else {
                body.classList.add('is-pc');
                deviceTag.innerText = "DESKTOP CORE ACTIVE";
                console.log("TRIPLE T PC DETECTED!");
            }
        }

        // Run detection on load
        detectDevice();

        // --- REST OF YOUR LOGIC ---
        const modal = document.getElementById('modalOverlay');
        const iframe = document.getElementById('contentFrame');
        let audioCtx;

        function playTung() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            oscillatorRamp = audioCtx.currentTime + 0.3;
            osc.frequency.exponentialRampToValueAtTime(40, oscillatorRamp);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, oscillatorRamp);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(oscillatorRamp);
        }

        function openModal(url) {
            playTung();
            iframe.src = url;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.style.display = 'none';
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
