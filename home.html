<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Space Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
            --ai-accent: #a855f7;
            --calc-accent: #4ade80;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 200%;
            z-index: 0; background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .stars-container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background-image: radial-gradient(1px 1px at 15% 15%, #fff, transparent), 
                              radial-gradient(1.5px 1.5px at 40% 70%, #fff, transparent);
            background-size: 300px 300px;
            animation: starLoop 60s linear infinite;
        }
        @keyframes starLoop { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        .main-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%; gap: 2rem;
            padding: 20px; box-sizing: border-box;
        }

        h1 { font-size: 1.5rem; letter-spacing: 0.5rem; text-transform: uppercase; text-align: center; }

        .button-grid {
            display: grid; 
            gap: 1rem; 
            width: 100%; 
            max-width: 900px;
        }

        /* Logic for Grid */
        .is-pc .button-grid { grid-template-columns: repeat(4, 1fr); }
        .is-mobile .button-grid { grid-template-columns: repeat(2, 1fr); }

        .nav-btn {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 2rem 0.5rem;
            color: white;
            cursor: pointer;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: 0.3s;
        }

        .nav-btn i { font-size: 2rem; }
        .nav-btn span { font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; }

        .is-pc .nav-btn:hover { transform: scale(1.05); border-color: var(--accent); }
        
        #modalOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; flex-direction: column;
        }
        .modal-header { padding: 10px; display: flex; justify-content: flex-end; background: #111; }
        .close-btn { background: #333; border: none; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        iframe { flex-grow: 1; border: none; }
    </style>
</head>
<body class="detecting">

    <div class="stars-container"></div>

    <main class="main-wrapper">
        <h1>CONSTELLATION</h1>

        <section class="button-grid">
            <button class="nav-btn" onclick="openModal('games.html')">
                <i class="fa-solid fa-gamepad"></i><span>Games</span>
            </button>
            <button class="nav-btn" style="border-color: var(--ai-accent);" onclick="openModal('luke-ai.html')">
                <i class="fa-solid fa-robot" style="color: var(--ai-accent);"></i><span>Luke AI</span>
            </button>
            <button class="nav-btn" onclick="openModal('movies.html')">
                <i class="fa-solid fa-film"></i><span>Movies</span>
            </button>
            <button class="nav-btn" style="border-color: var(--calc-accent);" onclick="openModal('calculator.html')">
                <i class="fa-solid fa-calculator" style="color: var(--calc-accent);"></i><span>Calc</span>
            </button>
        </section>
    </main>

    <div id="modalOverlay">
        <div class="modal-header"><button class="close-btn" onclick="closeModal()">CLOSE [X]</button></div>
        <iframe id="contentFrame" src=""></iframe>
    </div>

    <script>
        // Device Detection
        const body = document.body;
        if (/android|iphone|ipad|ipod/i.test(navigator.userAgent)) {
            body.classList.add('is-mobile');
        } else {
            body.classList.add('is-pc');
        }

        const modal = document.getElementById('modalOverlay');
        const iframe = document.getElementById('contentFrame');
        let audioCtx;

        // --- THE ACTUAL TUNG SOUND ---
        function playTung() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const now = audioCtx.currentTime;
            
            // OSCILLATOR 1: The Deep Vibration
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(90, now); // Deep bass
            osc1.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
            gain1.gain.setValueAtTime(0.6, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.5);

            // OSCILLATOR 2: The Punchy "T" Sound
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(150, now); // Mid hit
            osc2.frequency.exponentialRampToValueAtTime(40, now + 0.2);
            gain2.gain.setValueAtTime(0.4, now);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.2);

            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);

            osc1.start(now);
            osc1.stop(now + 0.5);
            osc2.start(now);
            osc2.stop(now + 0.2);
        }

        function openModal(url) {
            playTung(); // BOIII TUNG TUNG TUNG!
            iframe.src = url;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            iframe.src = '';
        }

        // Essential to "unlock" audio on mobile/PC
        document.body.addEventListener('click', () => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }, { once: true });
    </script>
</body>
</html>
