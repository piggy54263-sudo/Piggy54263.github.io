<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Da Website</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d4ff;
            --ai-accent: #a855f7;
            --calc-accent: #4ade80;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- DYNAMIC SPACE ENGINE --- */
        .space-engine {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            overflow: hidden;
        }

        /* Moving Stars Layer 1 (Fast) */
        .space-engine::after {
            content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 200%;
            background-image: radial-gradient(2px 2px at 40px 60px, #fff, transparent),
                              radial-gradient(1.5px 1.5px at 150px 300px, #fff, transparent);
            background-size: 300px 300px;
            animation: warpMove 25s linear infinite;
            opacity: 0.8;
        }

        /* Moving Stars Layer 2 (Slow) */
        .space-engine::before {
            content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 200%;
            background-image: radial-gradient(1px 1px at 80px 120px, rgba(255,255,255,0.5), transparent),
                              radial-gradient(1.2px 1.2px at 250px 100px, rgba(255,255,255,0.3), transparent);
            background-size: 400px 400px;
            animation: warpMove 50s linear infinite;
            opacity: 0.4;
        }

        @keyframes warpMove {
            from { transform: translateY(0); }
            to { transform: translateY(50%); }
        }

        /* --- FLOATING LABELS --- */
        .constellation-label {
            position: absolute;
            color: rgba(0, 212, 255, 0.4);
            font-family: 'Courier New', monospace;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            white-space: nowrap;
            animation: floatArea 8s ease-in-out infinite alternate;
        }

        /* Drifting movement animation */
        @keyframes floatArea {
            0% { transform: translate(0, 0); opacity: 0.2; }
            50% { transform: translate(15px, -15px); opacity: 0.5; }
            100% { transform: translate(-10px, 10px); opacity: 0.2; }
        }

        /* --- MAIN UI --- */
        .main-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            width: 100%; height: 100%; gap: 2rem;
            padding: 20px; box-sizing: border-box;
        }

        h1 { 
            font-size: 1.8rem; letter-spacing: 0.6rem; 
            text-transform: uppercase; text-align: center; 
            font-weight: 200; 
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .button-grid {
            display: grid; gap: 1rem; width: 100%; max-width: 900px;
        }

        .is-pc .button-grid { grid-template-columns: repeat(4, 1fr); }
        .is-mobile .button-grid { grid-template-columns: repeat(2, 1fr); gap: 10px;}

        .nav-btn {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2.2rem 0.5rem;
            color: white;
            cursor: pointer;
            border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; gap: 1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .nav-btn i { font-size: 2.2rem; }
        .nav-btn span { font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; color: #ccc; }

        .is-pc .nav-btn:hover {
            transform: scale(1.08) translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        
        /* Modal System */
        #modalOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column;
        }
        .modal-header { padding: 12px; display: flex; justify-content: flex-end; background: #111; border-bottom: 1px solid #333;}
        .close-btn { background: #444; border: 1px solid #666; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        iframe { flex-grow: 1; border: none; }
    </style>
</head>
<body class="detecting">

    <div class="space-engine">
        <div class="constellation-label" style="top: 15%; left: 15%; animation-delay: 0s;">ALPHA SECTOR</div>
        <div class="constellation-label" style="top: 55%; left: 75%; animation-delay: -2s;">TRIPLE T CLUSTER</div>
        <div class="constellation-label" style="top: 80%; left: 20%; animation-delay: -4s;">BARRY'S VOID</div>
        <div class="constellation-label" style="top: 25%; left: 65%; animation-delay: -6s;">LUKE'S GATE</div>
    </div>

    <main class="main-wrapper">
        <h1>CONSTELLATION</h1>

        <section class="button-grid">
            <button class="nav-btn" onclick="openModal('games.html')">
                <i class="fa-solid fa-gamepad"></i><span>Games</span>
            </button>
            <button class="nav-btn" style="border-color: var(--ai-accent);" onclick="openModal('luke-ai.html')">
                <i class="fa-solid fa-robot" style="color: var(--ai-accent);"></i><span>Luke AI</span>
            </button>
            <button class="nav-btn" onclick="openModal('movies.html')">
                <i class="fa-solid fa-film"></i><span>Movies</span>
            </button>
            <button class="nav-btn" style="border-color: var(--calc-accent);" onclick="openModal('calculator.html')">
                <i class="fa-solid fa-calculator" style="color: var(--calc-accent);"></i><span>Calc</span>
            </button>
        </section>
    </main>

    <div id="modalOverlay">
        <div class="modal-header"><button class="close-btn" onclick="closeModal()">CLOSE [X]</button></div>
        <iframe id="contentFrame" src=""></iframe>
    </div>

    <script>
        // Device Detection
        const body = document.body;
        if (/android|iphone|ipad|ipod/i.test(navigator.userAgent)) {
            body.classList.add('is-mobile');
        } else {
            body.classList.add('is-pc');
        }

        const modal = document.getElementById('modalOverlay');
        const iframe = document.getElementById('contentFrame');
        let audioCtx;

        function playTung() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(80, now); // Slightly deeper TUNG
            osc1.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
            gain1.gain.setValueAtTime(0.7, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.5);

            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(140, now);
            osc2.frequency.exponentialRampToValueAtTime(30, now + 0.2);
            gain2.gain.setValueAtTime(0.4, now);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.2);

            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc1.start(now); osc1.stop(now + 0.5);
            osc2.start(now); osc2.stop(now + 0.2);
        }

        function openModal(url) {
            playTung();
            iframe.src = url;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.style.display = 'none';
            iframe.src = '';
            document.body.style.overflow = 'auto';
        }

        document.body.addEventListener('click', () => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }, { once: true });
    </script>
</body>
</html>
