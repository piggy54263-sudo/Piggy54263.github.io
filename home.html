<script>
    const modal = document.getElementById('modalOverlay');
    const iframe = document.getElementById('contentFrame');
    const aiInterface = document.getElementById('aiInterface');
    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');

    function openModal(url) {
        aiInterface.style.display = 'none';
        iframe.style.display = 'block';
        iframe.src = url;
        modal.style.display = 'flex';
    }

    function openAI() {
        iframe.style.display = 'none';
        aiInterface.style.display = 'flex';
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
        iframe.src = '';
    }

    // Brainrot Response Database
    const responses = {
        "hello": ["YO BOIII, Luke AI is locked in!!", "TUNG TUNG TUNG SAHUR!! You up??", "TRIPLE T IN THE CHAT BOIII!"],
        "who": ["I'm the main character BARRY DECUSE!", "Luke AI? Nah, I'm the CHICKEN BAKE DRAKE of this galaxy.", "TRIPLE T SQUAD ONLY!!"],
        "game": ["TRIPLE T games only, no mid stuff.", "TUNG TUNG TUNG SAHUR!! Go play something!", "BOIII if you don't click that game button right now..."],
        "movie": ["BARRY DECUSE is the director, BOIII!", "Watching a movie? CHICKEN BAKE DRAKE style!", "TUNG TUNG TUNG SAHUR!! Movie night!"],
        "triplet": ["TRIPLE T!! TRIPLE T!! TRIPLE T!!", "You know the code BOIII!! TRIPLE T for life."],
        "default": [
            "TUNG TUNG TUNG SAHUR!! I don't get it BOIII!",
            "CHICKEN BAKE DRAKE energy right there.",
            "BARRY DECUSE doesn't understand that, TRIPLE T!",
            "BOIII you really just said that? TUNG TUNG TUNG!",
            "That's not very TRIPLE T of you."
        ]
    };

    function sendMessage() {
        const text = chatInput.value.toLowerCase();
        if (!text) return;

        // Add user message
        chatLog.innerHTML += `<div class="user-msg">YOU: ${text}</div>`;
        chatInput.value = "";

        // Luke AI Brainrot Logic
        setTimeout(() => {
            let r = responses.default[Math.floor(Math.random() * responses.default.length)];
            
            // Check for keywords
            if (text.includes("hello") || text.includes("hi")) r = responses.hello[Math.floor(Math.random() * responses.hello.length)];
            else if (text.includes("who")) r = responses.who[Math.floor(Math.random() * responses.who.length)];
            else if (text.includes("game")) r = responses.game[Math.floor(Math.random() * responses.game.length)];
            else if (text.includes("movie")) r = responses.movie[Math.floor(Math.random() * responses.movie.length)];
            else if (text.includes("triple t") || text.includes("triplet")) r = responses.triplet[Math.floor(Math.random() * responses.triplet.length)];

            chatLog.innerHTML += `<div class="ai-msg">LUKE AI: ${r}</div>`;
            
            // Auto-scroll to bottom
            chatLog.scrollTop = chatLog.scrollHeight;
        }, 500);
    }

    // Listen for Enter key
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
