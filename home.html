<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boi</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* STARS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(100vh); }
}

/* TITLE */
.title {
  text-align: center;
  font-size: 45px;
  color: purple;
  text-shadow: 0 0 15px purple;
}

/* LOGO */
.logo {
  display: block;
  margin: 10px auto;
  width: 85px;
  border-radius: 15px;
  box-shadow: 0 0 20px purple;
}

/* BUTTONS */
.shortcuts {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid purple;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 10px purple;
}

.btn:hover {
  box-shadow: 0 0 25px purple;
}

/* VIEWER */
.viewer {
  width: 100%;
  height: calc(100vh - 200px);
  border: none;
}

/* MESSAGE */
.message {
  text-align: center;
  margin-top: 40px;
  color: gray;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="title">Boi</div>
<img class="logo" src="logo.png">

<div class="shortcuts">
  <div class="btn" onclick="openYouTube()">YouTube</div>
  <div class="btn" onclick="blocked()">Google</div>
  <div class="btn" onclick="blocked()">Discord</div>
  <div class="btn" onclick="blocked()">GitHub</div>
</div>

<div id="content">
  <div class="message">Click a shortcut</div>
</div>

<script>
function openYouTube() {
  document.getElementById("content").innerHTML =
    `<iframe class="viewer"
      src="https://www.youtube.com/embed?listType=mostPopular"
      allowfullscreen></iframe>`;
}

function blocked() {
  document.getElementById("content").innerHTML =
    `<div class="message">
      This site can't be opened inside here (blocked by browser).
    </div>`;
}

/* STARS */
const stars = document.getElementById("stars");

for (let i = 0; i < 80; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  stars.appendChild(s);
}
</script>

</body>
</html>
