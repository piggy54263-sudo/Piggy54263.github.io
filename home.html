<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boi</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* STARS */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.8;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(100vh); }
}

/* LOGO */
.logo {
  display: block;
  margin: 20px auto 5px;
  width: 85px;
  height: 85px;
  border-radius: 18px;
  box-shadow: 0 0 20px purple;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 45px;
  color: purple;
  text-shadow: 0 0 10px purple, 0 0 25px #b300ff;
  margin: 5px 0 15px;
}

/* BUTTON SHORTCUTS */
.shortcuts {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 10px;
}

.btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid purple;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 0 10px purple;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px purple;
}

/* ICONS */
.icon {
  width: 18px;
  height: 18px;
  border-radius: 4px;
}

/* IFRAME */
.viewer {
  width: 100%;
  height: calc(100vh - 200px);
  border: none;
  background: white;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<!-- 🔥 ONLY TITLE -->
<div class="title">Boi</div>

<!-- 🔥 LOGO (CHANGE THIS FILE) -->
<img class="logo" src="https://postimg.cc/Y4TB3xkY" alt="logo">

<!-- BUTTONS -->
<div class="shortcuts">

  <div class="btn" onclick="openSite('https://www.youtube.com')">
    <img class="icon" src="https://www.google.com/s2/favicons?domain=youtube.com">
    YouTube
  </div>

  <div class="btn" onclick="openSite('https://www.google.com')">
    <img class="icon" src="https://www.google.com/s2/favicons?domain=google.com">
    Google
  </div>

  <div class="btn" onclick="openSite('https://discord.com')">
    <img class="icon" src="https://www.google.com/s2/favicons?domain=discord.com">
    Discord
  </div>

  <div class="btn" onclick="openSite('https://github.com')">
    <img class="icon" src="https://www.google.com/s2/favicons?domain=github.com">
    GitHub
  </div>

</div>

<!-- WEBSITE VIEWER -->
<iframe class="viewer" id="viewer"></iframe>

<script>
function openSite(url) {
  document.getElementById("viewer").src = url;
}

/* STARS */
const stars = document.getElementById("stars");

for (let i = 0; i < 80; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  s.style.animationDuration = (2 + Math.random() * 5) + "s";
  stars.appendChild(s);
}
</script>

</body>
</html>
