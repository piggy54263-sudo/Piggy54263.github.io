<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple T Cinema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #000; color: white;
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
        }
        h2 { color: #a855f7; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .movie-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .movie-item {
            display: flex; align-items: center; gap: 15px;
            background: rgba(255,255,255,0.03); border: 1px solid #222;
            padding: 15px; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .movie-item:hover { background: rgba(168, 85, 247, 0.1); border-color: #a855f7; }
        .movie-item i { color: #a855f7; font-size: 1.2rem; }
        .details { display: flex; flex-direction: column; }
        .title { font-weight: bold; }
        .type { font-size: 0.7rem; color: #777; text-transform: uppercase; }
    </style>
</head>
<body>
    <h2><i class="fa-solid fa-film"></i> Cinema & Shows</h2>
    <div class="movie-list">
        <div class="movie-item" onclick="window.open('https://youtube.com', '_blank')">
            <i class="fa-solid fa-play"></i>
            <div class="details">
                <span class="title">BARRY DECUSE: THE MOVIE</span>
                <span class="type">Action / Brainrot</span>
            </div>
        </div>
        <div class="movie-item" onclick="alert('Locked by Luke AI!')">
            <i class="fa-solid fa-lock"></i>
            <div class="details">
                <span class="title">CHICKEN BAKE CHRONICLES</span>
                <span class="type">TV Show</span>
            </div>
        </div>
    </div>
</body>
</html>
