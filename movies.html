<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Website - Cinema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #000; color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        h2 { color: #00d4ff; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }

        /* --- VIDEO PLAYER BOX --- */
        .video-wrapper {
            position: relative; width: 100%; max-width: 900px;
            background: #111; border-radius: 12px; overflow: hidden;
            border: 1px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        video { width: 100%; display: block; background: #000; }

        /* --- CONTROLS --- */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex; align-items: center; padding: 15px;
            gap: 15px; box-sizing: border-box; opacity: 0; transition: opacity 0.3s;
        }
        .video-wrapper:hover .custom-controls { opacity: 1; }

        .btn { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; }
        .btn:hover { color: #00d4ff; }

        .volume-box { display: flex; align-items: center; gap: 8px; }
        input[type="range"] { cursor: pointer; accent-color: #00d4ff; width: 80px; }
        .time-display { font-size: 0.8rem; font-family: monospace; flex-grow: 1; }

        /* --- MOVIE SELECTION MENU --- */
        .movie-menu {
            margin-top: 30px; width: 100%; max-width: 900px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .movie-card {
            background: #111; border: 1px solid #333; padding: 15px;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }

        .movie-card:hover {
            border-color: #00d4ff; background: #1a1a1a; transform: translateY(-3px);
        }

        .movie-card i { color: #00d4ff; }
        .movie-card span { font-weight: bold; font-size: 0.9rem; }
        
        .cc-active { color: #00d4ff !important; }
    </style>
</head>
<body>

    <h2><i class="fa-solid fa-film"></i> TRIPLE T CINEMA</h2>

    <div class="video-wrapper">
        <video id="mainVideo">
            <source id="videoSource" src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            <track id="enTrack" label="English" kind="subtitles" srclang="en" src="" default>
        </video>

        <div class="custom-controls">
            <button class="btn" onclick="togglePlay()"><i id="playIcon" class="fa-solid fa-play"></i></button>
            <div class="volume-box">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
            </div>
            <div class="time-display" id="timeShow">0:00 / 0:00</div>
            <button class="btn" id="ccBtn" onclick="toggleCC()"><i class="fa-solid fa-closed-captioning"></i></button>
            <button class="btn" onclick="toggleFull()"><i class="fa-solid fa-expand"></i></button>
        </div>
    </div>

    <div class="movie-menu">
        <div class="movie-card" onclick="loadMovie('https://www.w3schools.com/html/mov_bbb.mp4', 'Placeholder: Bunny', '')">
            <i class="fa-solid fa-circle-play"></i>
            <span>Big Buck Bunny</span>
        </div>

        <div class="movie-card" onclick="loadMovie('YOUR_MOVIE_LINK_HERE.mp4', 'Triple T Movie 1', 'subs1.vtt')">
            <i class="fa-solid fa-circle-play"></i>
            <span>Triple T Action</span>
        </div>

        <div class="movie-card" onclick="loadMovie('YOUR_SHOW_LINK_HERE.mp4', 'Luke AI Show', 'subs2.vtt')">
            <i class="fa-solid fa-circle-play"></i>
            <span>The Luke AI Show</span>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const source = document.getElementById('videoSource');
        const playIcon = document.getElementById('playIcon');
        const vol = document.getElementById('volumeSlider');
        const timeShow = document.getElementById('timeShow');
        const track = document.getElementById('enTrack');

        // FUNCTION TO LOAD NEW MOVIE
        function loadMovie(file, title, subs) {
            source.src = file;
            track.src = subs;
            video.load(); // Reloads the player with the new file
            video.play();
            playIcon.className = "fa-solid fa-pause";
            console.log("Now playing: " + title);
        }

        // Standard Controls Logic
        function togglePlay() {
            if (video.paused) { video.play(); playIcon.className = "fa-solid fa-pause"; }
            else { video.pause(); playIcon.className = "fa-solid fa-play"; }
        }

        vol.addEventListener('input', (e) => { video.volume = e.target.value; });

        video.addEventListener('timeupdate', () => {
            let curr = Math.floor(video.currentTime);
            let dur = Math.floor(video.duration) || 0;
            timeShow.innerText = `${formatTime(curr)} / ${formatTime(dur)}`;
        });

        function formatTime(sec) {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            return `${m}:${s < 10 ? '0'+s : s}`;
        }

        function toggleCC() {
            const btn = document.getElementById('ccBtn');
            const videoTrack = video.textTracks[0];
            if (videoTrack.mode === "showing") {
                videoTrack.mode = "disabled";
                btn.classList.remove('cc-active');
            } else {
                videoTrack.mode = "showing";
                btn.classList.add('cc-active');
            }
        }

        function toggleFull() {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
