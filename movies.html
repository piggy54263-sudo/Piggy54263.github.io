<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Website - Cinema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #000; color: white; font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        h2 { color: #00d4ff; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }

        /* --- VIDEO PLAYER BOX --- */
        .video-wrapper {
            position: relative; width: 100%; max-width: 900px;
            background: #111; border-radius: 12px; overflow: hidden;
            border: 1px solid #333; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        video { width: 100%; display: block; }

        /* --- CUSTOM CONTROLS --- */
        .custom-controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex; align-items: center; padding: 15px;
            gap: 15px; box-sizing: border-box;
            opacity: 0; transition: opacity 0.3s;
        }

        .video-wrapper:hover .custom-controls { opacity: 1; }

        .btn { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn:hover { color: #00d4ff; transform: scale(1.1); }

        /* Volume Slider */
        .volume-box { display: flex; align-items: center; gap: 8px; }
        input[type="range"] { cursor: pointer; accent-color: #00d4ff; width: 80px; }

        .time-display { font-size: 0.8rem; font-family: monospace; flex-grow: 1; }

        .cc-active { color: #00d4ff !important; border-bottom: 2px solid #00d4ff; }
    </style>
</head>
<body>

    <h2><i class="fa-solid fa-film"></i> TRIPLE T CINEMA</h2>

    <div class="video-wrapper" id="player">
        <video id="mainVideo">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            <track id="enTrack" label="English" kind="subtitles" srclang="en" src="subtitles.vtt" default>
            Your browser does not support HTML5 video.
        </video>

        <div class="custom-controls">
            <button class="btn" onclick="togglePlay()"><i id="playIcon" class="fa-solid fa-play"></i></button>
            
            <div class="volume-box">
                <i class="fa-solid fa-volume-high"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
            </div>

            <div class="time-display" id="timeShow">0:00 / 0:00</div>

            <button class="btn" id="ccBtn" onclick="toggleCC()"><i class="fa-solid fa-closed-captioning"></i></button>
            
            <button class="btn" onclick="toggleFull()"><i class="fa-solid fa-expand"></i></button>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const playIcon = document.getElementById('playIcon');
        const vol = document.getElementById('volumeSlider');
        const timeShow = document.getElementById('timeShow');
        const track = video.textTracks[0];

        // Play/Pause
        function togglePlay() {
            if (video.paused) {
                video.play();
                playIcon.className = "fa-solid fa-pause";
            } else {
                video.pause();
                playIcon.className = "fa-solid fa-play";
            }
        }

        // Volume
        vol.addEventListener('input', (e) => {
            video.volume = e.target.value;
        });

        // Time Update
        video.addEventListener('timeupdate', () => {
            let curr = Math.floor(video.currentTime);
            let dur = Math.floor(video.duration) || 0;
            timeShow.innerText = `${formatTime(curr)} / ${formatTime(dur)}`;
        });

        function formatTime(sec) {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            return `${m}:${s < 10 ? '0'+s : s}`;
        }

        // Subtitles (CC) Toggle
        function toggleCC() {
            const btn = document.getElementById('ccBtn');
            if (track.mode === "showing") {
                track.mode = "disabled";
                btn.classList.remove('cc-active');
            } else {
                track.mode = "showing";
                btn.classList.add('cc-active');
            }
        }

        // Fullscreen
        function toggleFull() {
            if (video.requestFullscreen) video.requestFullscreen();
            else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
        }
    </script>
</body>
</html>
