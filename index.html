<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #222;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #357abd;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Welcome</h1>
  <p>Click the button to start</p>
  <button onclick="alert('W')">Start</button>
</div>

</body>
</html>
