<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrakeGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: #32CD32; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Sidebar Styles */
        #sidebar { width: 260px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 15px; }
        .sidebar-item { padding: 10px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .sidebar-item:hover { background: #1a1a1a; border-color: #32CD32; color: #fff; }
        .sidebar-header { font-weight: bold; color: #32CD32; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; font-size: 0.8rem; }
        
        /* Main Chat Area */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.8); border: 1px solid #32CD32; color: #32CD32; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; z-index: 9999; transition: 0.3s; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .back-btn:hover { background: #32CD32; color: #000; box-shadow: 0 0 15px #32CD32; }

        h1 { margin-top: 20px; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #32CD32; font-size: 1.5rem; }
        #chat-container { width: 95%; max-width: 800px; height: 75vh; background: transparent; margin-top: 10px; display: flex; flex-direction: column; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        /* ChatGPT Style Bubbles */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.6; font-size: 1rem; word-wrap: break-word; position: relative; }
        .user-msg { align-self: flex-end; background: #2f2f2f; color: #fff; border-bottom-right-radius: 2px; border: 1px solid #444; }
        .ai-msg { align-self: flex-start; background: transparent; color: #ececec; border-bottom-left-radius: 2px; padding-left: 0; }
        .ai-msg::before { content: "\f544"; font-family: "Font Awesome 6 Free"; font-weight: 900; margin-right: 10px; color: #32CD32; }
        
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 15px; border: 2px solid #32CD32; box-shadow: 0 0 20px rgba(50, 205, 50, 0.2); }

        /* Input Area - ChatGPT Style */
        .input-wrapper { width: 95%; max-width: 750px; background: #212121; border-radius: 25px; border: 1px solid #444; display: flex; align-items: center; padding: 10px 20px; margin-bottom: 20px; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: #32CD32; box-shadow: 0 0 10px rgba(50, 205, 50, 0.1); }
        
        input[type="text"] { flex-grow: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 1rem; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 10px; width: 95%; max-width: 800px; justify-content: center; }
        button { background: rgba(50, 205, 50, 0.1); border: 1px solid #222; padding: 6px 12px; border-radius: 8px; color: #ccc; cursor: pointer; transition: 0.3s; font-size: 0.75rem; }
        button:hover { border-color: #32CD32; color: #fff; }
        
        #sendBtn { background: #32CD32; color: #000; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: none; font-size: 1rem; }
        #sendBtn:hover { transform: scale(1.05); background: #fff; }
        
        #fileInput { display: none; }
        .upload-label { cursor: pointer; color: #888; font-size: 1.2rem; margin-right: 10px; transition: 0.3s; }
        .upload-label:hover { color: #32CD32; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">DrakeGPT History</div>
        <button onclick="newChat()"><i class="fa-solid fa-plus"></i> New Chat</button>
        <div id="history-list" style="flex-grow: 1; overflow-y: auto; margin-top: 15px;"></div>
        <button onclick="clearAllHistory()" style="color: #ff4444; border-color: #442222;"><i class="fa-solid fa-trash"></i> Clear All</button>
    </div>

    <div id="main-content">
        <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> HUB</a>
        <h1>DrakeGPT</h1>

        <div class="controls">
            <button onclick="manualSave()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
            <button id="toggleAutoSave" onclick="toggleAutoSave()">Auto-Save: ON</button>
        </div>

        <div id="chat-container">
            <div id="messages">
                <div class="msg ai-msg" id="intro-msg">Yo... DrakeGPT active. We standing on business today. What you need boiii?</div>
            </div>
            <div style="display: flex; justify-content: center; width: 100%;">
                <div class="input-wrapper">
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload()">
                    <label for="fileInput" class="upload-label"><i class="fa-solid fa-paperclip"></i></label>
                    <input type="text" id="userInput" placeholder="Message DrakeGPT..." onkeydown="if(event.key==='Enter') sendMessage()">
                    <button id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let GROQ_KEY = ""; 
        let chatHistory = [];
        let autoSave = true;
        let currentChatId = null;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            if (!GROQ_KEY) {
                GROQ_KEY = prompt("Enter Groq API Key:");
                if (!GROQ_KEY) return;
            }

            addMessage(text, 'user-msg');
            chatHistory.push({ role: "user", content: text });

            // Image Generation Logic
            if (text.toLowerCase().includes("generate") && (text.toLowerCase().includes("image") || text.toLowerCase().includes("picture"))) {
                generateImage(text);
                return;
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ 
                            role: "system", 
                            content: "You are DrakeGPT, a highly intelligent AI built for math, science, and elite advice. You work exactly like ChatGPT but with a unique style. Use slang like 'nah', 'boiii', 'triple t', and 'tung tung tung sahur'. Be high-energy and stand on business. If a user asks for an image, tell them you're generating it now." 
                        }, ...chatHistory]
                    })
                });
                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                addMessage(aiResponse, 'ai-msg');
                chatHistory.push({ role: "assistant", content: aiResponse });
                
                if (autoSave) manualSave();
            } catch (e) {
                addMessage("Nah boiii, something went wrong with the link. Check that key.", 'ai-msg');
            }
        }

        function generateImage(promptText) {
            const cleanPrompt = promptText.replace(/generate|image|picture/gi, '').trim();
            const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(cleanPrompt)}?width=1024&height=1024&seed=${Math.floor(Math.random() * 1000000)}&nologo=true`;
            
            addMessage("Tung tung tung sahur! Generating that for you right now boiii...", 'ai-msg');
            
            setTimeout(() => {
                const chatBox = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = `msg ai-msg`;
                div.innerHTML = `Triple T, here is your image:<br><img src="${imageUrl}" alt="Generated Image">`;
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
                chatHistory.push({ role: "assistant", content: `[Generated Image: ${cleanPrompt}]` });
                if (autoSave) manualSave();
            }, 1000);
        }

        function addMessage(text, type, imgSrc = null) {
            const chatBox = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            if (imgSrc) {
                const img = document.createElement('img');
                img.src = imgSrc;
                div.appendChild(img);
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleFileUpload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                addMessage("", "user-msg", base64Image);
                chatHistory.push({ role: "user", content: [
                    { type: "text", text: "[Image Sent]" },
                    { type: "image_url", image_url: { url: base64Image } }
                ]});
                if(autoSave) manualSave();
            };
            reader.readAsDataURL(file);
        }

        function toggleAutoSave() {
            autoSave = !autoSave;
            document.getElementById('toggleAutoSave').innerText = `Auto-Save: ${autoSave ? 'ON' : 'OFF'}`;
        }

        function manualSave() {
            if (chatHistory.length === 0) return;
            let savedChats = JSON.parse(localStorage.getItem('drake_saved_chats') || '[]');
            if (!currentChatId) {
                currentChatId = Date.now();
                const title = chatHistory[0].content.toString().substring(0, 25) || "New Chat";
                savedChats.push({ id: currentChatId, title: title, history: chatHistory });
            } else {
                const index = savedChats.findIndex(c => c.id === currentChatId);
                if(index !== -1) savedChats[index].history = chatHistory;
            }
            localStorage.setItem('drake_saved_chats', JSON.stringify(savedChats));
            loadSidebar();
        }

        function loadSidebar() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            let savedChats = JSON.parse(localStorage.getItem('drake_saved_chats') || '[]');
            savedChats.reverse().forEach(chat => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                item.innerHTML = `<i class="fa-regular fa-message"></i> ${chat.title}`;
                item.onclick = () => loadChat(chat.id);
                list.appendChild(item);
            });
        }

        function loadChat(id) {
            let savedChats = JSON.parse(localStorage.getItem('drake_saved_chats') || '[]');
            const chat = savedChats.find(c => c.id === id);
            if (chat) {
                currentChatId = chat.id;
                chatHistory = chat.history;
                const chatBox = document.getElementById('messages');
                chatBox.innerHTML = '';
                chatHistory.forEach(msg => {
                    if (Array.isArray(msg.content)) {
                        addMessage(msg.content[0].text, msg.role === 'user' ? 'user-msg' : 'ai-msg', msg.content[1]?.image_url?.url);
                    } else {
                        addMessage(msg.content, msg.role === 'user' ? 'user-msg' : 'ai-msg');
                    }
                });
            }
        }

        function newChat() {
            currentChatId = null;
            chatHistory = [];
            document.getElementById('messages').innerHTML = '<div class="msg ai-msg">New session boiii. Standing on business.</div>';
        }

        function clearAllHistory() {
            if (confirm("Delete all DrakeGPT chats?")) {
                localStorage.removeItem('drake_saved_chats');
                newChat();
                loadSidebar();
            }
        }

        window.onload = loadSidebar;
    </script>
</body>
</html>
