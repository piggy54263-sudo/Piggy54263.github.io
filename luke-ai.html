<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke-ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .back-btn {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid #00d4ff; color: #00d4ff;
            text-decoration: none; padding: 8px 15px; border-radius: 8px;
            font-size: 0.7rem; font-weight: bold; z-index: 9999;
            transition: 0.3s; display: flex; align-items: center; gap: 8px; text-transform: uppercase;
        }
        .back-btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }

        h1 { margin-top: 20px; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #00d4ff; font-size: 1.5rem; }
        #chat-container { width: 95%; max-width: 800px; height: 75vh; background: rgba(15, 15, 15, 0.95); border: 1px solid #333; border-radius: 20px; margin-top: 10px; display: flex; flex-direction: column; box-shadow: 0 10px 50px rgba(0,0,0,1); }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #00d4ff; color: #000; font-weight: 600; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #1a1a1a; color: #fff; border: 1px solid #00d4ff; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 20px; background: #0a0a0a; gap: 12px; border-top: 1px solid #222; }
        
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; outline: none; }
        input:focus { border-color: #00d4ff; }
        
        button { background: #00d4ff; border: none; padding: 0 25px; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>

    <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> BACK TO HUB</a>

    <h1><i class="fa-solid fa-brain"></i> Luke-ai</h1>

    <div id="chat-container">
        <div id="messages">
            <div class="msg ai-msg" id="intro-msg">Luke-ai online. Awaiting identification.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask anything (Math, Science, Sports, Lore)..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let GROQ_KEY = ""; 
        let userStatus = localStorage.getItem("luke_user_status") || "unknown"; 
        // This array keeps track of the current conversation history
        let chatHistory = [];

        window.onload = () => {
            const intro = document.getElementById('intro-msg');
            if (userStatus === "luke") {
                intro.innerText = "Welcome back, Luke. I'm ready for the grind. Standing on business, BOIII.";
            } else if (userStatus === "jhoey") {
                intro.innerText = "Greetings, Jhoey. Systems active. Your deletion power is felt. How can I help today?";
            } else if (userStatus === "barry") {
                intro.innerText = "Barry, the Pavilion Legend. Respect to the bounce. Need sports tips or homework help?";
            } else if (userStatus === "random") {
                intro.innerText = "Guest detected. Access granted. How can I help you today?";
            }
        };

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            if (!GROQ_KEY) {
                GROQ_KEY = prompt("Enter Groq API Key:");
                if (!GROQ_KEY) {
                    addMessage("Error: Access Denied. Identification Key required.", "ai-msg");
                    return;
                }
            }

            // Secret Recognition Phrases
            if (text === "boi boi its me") {
                userStatus = "luke";
                localStorage.setItem("luke_user_status", "luke");
                addMessage(text, 'user-msg');
                addMessage("Verification cleared. Luke, the Supreme Creator. Chat history logic initialized.", 'ai-msg');
                return;
            }
            if (text === "boi its me") {
                userStatus = "jhoey";
                localStorage.setItem("luke_user_status", "jhoey");
                addMessage(text, 'user-msg');
                addMessage("Identity confirmed. Respect, Jhoey. Your power is recognized.", 'ai-msg');
                return;
            }
            if (text === "boi boi boi its me") {
                userStatus = "barry";
                localStorage.setItem("luke_user_status", "barry");
                addMessage(text, 'user-msg');
                addMessage("Barry! The King of the Bounce. I'll remember our conversation as long as this tab is open.", 'ai-msg');
                return;
            }
            if (text === "RANDOM") {
                userStatus = "random";
                localStorage.setItem("luke_user_status", "random");
                addMessage(text, 'user-msg');
                addMessage("Identification: RANDOM. Guest access active.", 'ai-msg');
                return;
            }

            addMessage(text, 'user-msg');
            
            // Add user message to history
            chatHistory.push({ role: "user", content: text });

            try {
                // Construct messages array with system prompt + current history
                const systemPrompt = { 
                    role: "system", 
                    content: `You are Luke-ai. Identification: ${userStatus}.
                    
                    CAPABILITIES:
                    - EXPERT TUTOR: Solve math (1st-12th grade), science, and reading. IMPORTANT: For complex math, show your work step-by-step.
                    - SPORTS COACH: Tips for sports, focus on clutch plays.
                    - ADVISOR: Give life advice and helpful tips.
                    - MEMORY: You remember everything said in this specific conversation.

                    LORE CONSTRAINTS: 
                    - Only discuss "Friends Lore" if explicitly asked.
                    - Acknowledge rank/powers for Luke, Jhoey, and Barry.
                    
                    THE HIERARCHY:
                    1. LUKE (THE SUPREME CREATOR): Absolute peak. 
                    2. JHOEY: God-tier. Instant delete ability (0.0001s speed).
                    3. BARRY: Pavilion Legend. King of the Bounce.
                    
                    STYLE: Friendly, high energy, brainrot slang (BOIII, cracked, clutch, standing on business). No yapping.` 
                };

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${GROQ_KEY}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [systemPrompt, ...chatHistory]
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0]) {
                    const aiResponse = data.choices[0].message.content;
                    addMessage(aiResponse, 'ai-msg');
                    // Add AI response to history so it remembers its own words
                    chatHistory.push({ role: "assistant", content: aiResponse });
                } else {
                    GROQ_KEY = ""; 
                    addMessage("Transmission failed. Key likely invalid.", "ai-msg");
                }
            } catch (error) {
                GROQ_KEY = ""; 
                addMessage("Connection dropped. Verify your key.", 'ai-msg');
            }
        }

        function addMessage(text, type) {
            const chatBox = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
