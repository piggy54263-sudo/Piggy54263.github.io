<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke AI Core</title>
    <style>
        body { background: #000; color: #a855f7; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chatLog { flex-grow: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #333; }
        .user-msg { color: #00d4ff; margin: 10px 0; text-align: right; }
        .ai-msg { color: #a855f7; margin: 10px 0; font-weight: bold; }
        .input-area { display: flex; padding: 15px; background: #0a0a0a; }
        input { flex-grow: 1; background: #111; border: 1px solid #a855f7; color: #fff; padding: 12px; outline: none; border-radius: 4px; }
        button { background: #a855f7; border: none; color: black; padding: 0 20px; margin-left: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="chatLog">
        <div class="ai-msg">LUKE AI: SYSTEMS ONLINE... BOIII, WE ARE LOCKED IN!</div>
    </div>
    <div class="input-area">
        <input type="text" id="chatInput" placeholder="Talk to Luke...">
        <button id="sendBtn">SEND</button>
    </div>

    <script>
        const chatInput = document.getElementById('chatInput');
        const chatLog = document.getElementById('chatLog');
        const sendBtn = document.getElementById('sendBtn');

        function talk() {
            const text = chatInput.value.trim().toLowerCase();
            if (!text) return;

            // 1. Show User Message
            chatLog.innerHTML += `<div class="user-msg">YOU: ${text}</div>`;
            chatInput.value = "";

            setTimeout(() => {
                let reply = "BOIII, my logic core is vibrating! Try again with TRIPLE T energy!";

                // 2. The Logic Tree
                if (text.includes("hello") || text.includes("yo")) {
                    reply = "YO YO YO BOIII! TUNG TUNG TUNG SAHUR!";
                } else if (text.includes("+") || text.includes("-") || text.includes("*")) {
                    try {
                        const result = eval(text.replace(/[^-()\d/*+.]/g, ''));
                        reply = `BOIII, easy math! That's ${result}!! TRIPLE T BRAIN!`;
                    } catch(e) { reply = "Math is bugged, BOIII!"; }
                } else if (text.includes("drake")) {
                    reply = "CHICKEN BAKE DRAKE is the vibe!";
                } else if (text.includes("barry")) {
                    reply = "BARRY DECUSE is a legend! Triple T Squad!!";
                } else if (text.includes("triple t")) {
                    reply = "TRIPLE T!! TUNG TUNG TUNG!!";
                }

                // 3. Show AI Message
                chatLog.innerHTML += `<div class="ai-msg">LUKE AI: ${reply}</div>`;
                chatLog.scrollTop = chatLog.scrollHeight;
            }, 400);
        }

        // Click or Enter
        sendBtn.addEventListener('click', talk);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') talk(); });
    </script>
</body>
</html>
