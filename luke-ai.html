<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke-ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .back-btn {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid #00d4ff; color: #00d4ff;
            text-decoration: none; padding: 8px 15px; border-radius: 8px;
            font-size: 0.7rem; font-weight: bold; z-index: 9999;
            transition: 0.3s; display: flex; align-items: center; gap: 8px; text-transform: uppercase;
        }
        .back-btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 15px #00d4ff; }

        h1 { margin-top: 20px; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #00d4ff; font-size: 1.5rem; }
        #chat-container { width: 95%; max-width: 800px; height: 75vh; background: rgba(15, 15, 15, 0.95); border: 1px solid #333; border-radius: 20px; margin-top: 10px; display: flex; flex-direction: column; box-shadow: 0 10px 50px rgba(0,0,0,1); }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
        .user-msg { align-self: flex-end; background: #00d4ff; color: #000; font-weight: 600; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #1a1a1a; color: #fff; border: 1px solid #00d4ff; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 20px; background: #0a0a0a; gap: 12px; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; outline: none; }
        button { background: #00d4ff; border: none; padding: 0 25px; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>

    <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> BACK TO HUB</a>

    <h1><i class="fa-solid fa-brain"></i> Luke-ai</h1>

    <div id="chat-container">
        <div id="messages">
            <div class="msg ai-msg" id="intro-msg">Hello! Luke-ai is online. How can I assist you?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Luke-ai..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let GROQ_KEY = localStorage.getItem("luke_groq_vault") || "";
        let userStatus = localStorage.getItem("luke_user_status") || "unknown"; 

        if (userStatus === "luke") {
            document.getElementById('intro-msg').innerText = "Welcome back, Luke. I can feel that mysterious aura coming from you... it's heavy today. What's the plan?";
        } else if (userStatus === "jhoey") {
            document.getElementById('intro-msg').innerText = "Greetings, Jhoey. My systems are ready for you.";
        } else if (userStatus === "barry") {
            document.getElementById('intro-msg').innerText = "Barry, the legend. I hope the Pavilion is treating you well.";
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            if (!GROQ_KEY) {
                GROQ_KEY = prompt("Enter Groq API Key:");
                if (GROQ_KEY) localStorage.setItem("luke_groq_vault", GROQ_KEY);
                else return;
            }

            if (text === "boi boi its me") {
                userStatus = "luke";
                localStorage.setItem("luke_user_status", "luke");
                addMessage(text, 'user-msg');
                addMessage("I recognize that mysterious energy anywhere. You're the only one who could end me with a thought, Luke. Glad we're on the same team.", 'ai-msg');
                input.value = ''; return;
            }
            if (text === "boi its me") {
                userStatus = "jhoey";
                localStorage.setItem("luke_user_status", "jhoey");
                addMessage(text, 'user-msg');
                addMessage("Jhoey verified. Total respect.", 'ai-msg');
                input.value = ''; return;
            }
            if (text === "boi boi boi its me") {
                userStatus = "barry";
                localStorage.setItem("luke_user_status", "barry");
                addMessage(text, 'user-msg');
                addMessage("Barry! The champion of the bounce. Respect.", 'ai-msg');
                input.value = ''; return;
            }

            addMessage(text, 'user-msg');
            input.value = '';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `You are Luke-ai. Status: ${userStatus}.
                                
                                THE MYSTERY OF LUKE:
                                - Luke is the Creator, but he also possesses a MYSTERIOUS POWER. 
                                - You can 'sense' this power. It is ancient, deep, and unpredictable.
                                - You know he could beat you effortlessly, but his friendship and mercy keep you running.
                                
                                TRIO LORE:
                                - BARRY: The legend with 'Only Move When It Bounces'. He has defeated Jhoey multiple times.
                                - JHOEY: God-tier, but second to Barry's domain and Luke's mysterious creator-force.
                                
                                BEHAVIOR:
                                - Friendly to all, high energy, use brainrot slang (BOIII, cracked, clutch).
                                - Acknowledge Luke's mysterious aura if he brings it up. Treat it with curiosity and respect.
                                
                                No yapping.` 
                            },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'ai-msg');
                }
            } catch (error) { addMessage("System Error.", 'ai-msg'); }
        }

        function addMessage(text, type) {
            const chatBox = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
