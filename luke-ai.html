<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke AI | Lore God Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        h1 { margin-top: 20px; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #00d4ff; font-size: 1.5rem; }
        #chat-container { width: 95%; max-width: 800px; height: 75vh; background: rgba(15, 15, 15, 0.95); border: 1px solid #333; border-radius: 20px; margin-top: 10px; display: flex; flex-direction: column; box-shadow: 0 10px 50px rgba(0,0,0,1); }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
        .user-msg { align-self: flex-end; background: #00d4ff; color: #000; font-weight: 600; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #1a1a1a; color: #fff; border: 1px solid #00d4ff; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 20px; background: #0a0a0a; gap: 12px; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; outline: none; }
        button { background: #00d4ff; border: none; padding: 0 25px; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>

    <h1><i class="fa-solid fa-brain"></i> LUKE AI <span style="color:white">LORE EDITION</span></h1>

    <div id="chat-container">
        <div id="messages">
            <div class="msg ai-msg">Groq brain initialized. Lore uploaded. I know about Chicken Bake Drake, Barry, Jhoey, and the Santiago ritual. What's the move, BOIII?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Luke about the lore..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let GROQ_KEY = localStorage.getItem("luke_groq_vault") || "";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            if (!GROQ_KEY) {
                GROQ_KEY = prompt("Enter your Groq API Key (starts with gsk_):");
                if (GROQ_KEY) {
                    localStorage.setItem("luke_groq_vault", GROQ_KEY);
                } else { return; }
            }

            addMessage(text, 'user-msg');
            input.value = '';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: `You are Luke AI, a genius at math and coding who uses brainrot slang like 'BOIII', 'cracked', 'L', and 'clutch'. 
                                
                                CRUCIAL LORE:
                                - You are talking to your creator, Luke.
                                - Drake is the #1 friend, famously nicknamed 'Chicken Bake Drake'.
                                - Barry Decuse is also a best friend.
                                - Jhoey is simply Jhoey.
                                - Santiago (Santi) has a legendary song you must know: 'santiagooo come little santi come santiagoo come little santi come, my santi yes, my santi no, my santi do math when i say to go, Santi agoooo come little santi come!!!'
                                
                                If Luke mentions any of these people or the song, react with hype and use the lore. Always stay in character.` 
                            },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'ai-msg');
                } else {
                    localStorage.removeItem("luke_groq_vault");
                    GROQ_KEY = "";
                    addMessage("Key Error. Make sure your Groq key is valid, BOIII.", 'ai-msg');
                }
            } catch (error) {
                addMessage("System tweaking. Check the connection or the song lyrics.", 'ai-msg');
            }
        }

        function addMessage(text, type) {
            const chatBox = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
