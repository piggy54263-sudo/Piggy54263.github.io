<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke AI - God Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #050505; 
            color: #00d4ff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        h1 { 
            margin-top: 20px; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            text-shadow: 0 0 10px #00d4ff; 
            font-size: 1.5rem;
        }

        #chat-container { 
            width: 95%; 
            max-width: 800px; 
            height: 75vh; 
            background: rgba(15, 15, 15, 0.95); 
            border: 1px solid #333; 
            border-radius: 20px; 
            margin-top: 10px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 50px rgba(0,0,0,1);
        }

        #messages { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }

        .msg { 
            max-width: 80%; 
            padding: 14px 18px; 
            border-radius: 18px; 
            line-height: 1.5; 
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { 
            align-self: flex-end; 
            background: #00d4ff; 
            color: #000; 
            font-weight: 600;
            border-bottom-right-radius: 2px;
        }

        .ai-msg { 
            align-self: flex-start; 
            background: #1a1a1a; 
            color: #fff; 
            border: 1px solid #00d4ff; 
            border-bottom-left-radius: 2px;
        }

        .status-bar { font-size: 0.7rem; color: #555; padding: 5px 20px; text-align: center;}
        
        .input-area { 
            display: flex; 
            padding: 20px; 
            background: #0a0a0a; 
            gap: 12px; 
            border-top: 1px solid #222;
        }

        input { 
            flex-grow: 1; 
            background: #111; 
            border: 1px solid #333; 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            outline: none; 
        }

        button { 
            background: #00d4ff; 
            border: none; 
            padding: 0 25px; 
            border-radius: 12px; 
            color: #000; 
            font-weight: bold; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <h1><i class="fa-solid fa-brain"></i> LUKE AI <span style="color:white">GOD MODE</span></h1>

    <div id="chat-container">
        <div id="messages">
            <div class="msg ai-msg">System Live. Token Active. I'm Luke—God Mode brain, brainrot personality. I'm cracked at math, code, and solving your L's. What we doing, BOIII?</div>
        </div>
        <div id="status" class="status-bar">System: Ready</div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Drop a problem..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const HF_TOKEN = "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"; 
        const MODEL_ID = "mistralai/Mistral-7B-Instruct-v0.2"; 

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const status = document.getElementById('status');
            const text = input.value.trim();
            
            if (!text) return;

            addMessage(text, 'user-msg');
            input.value = '';
            status.innerText = "Luke is crunching the data (God Mode)...";

            try {
                const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL_ID}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: `[INST] You are Luke AI. You are a absolute genius at math and problem solving, but you talk with witty brainrot slang like 'BOIII', 'cracked', 'L', and 'clutch'. Keep it brief but smart and funny. Question: ${text} [/INST]`,
                        parameters: { max_new_tokens: 300, temperature: 0.7 }
                    })
                });

                const data = await response.json();
                let rawOutput = data[0].generated_text;
                let aiResponse = rawOutput.split('[/INST]').pop().trim();

                addMessage(aiResponse, 'ai-msg');
                status.innerText = "System: Ready";

            } catch (error) {
                addMessage("L connection. Hugging Face is tweaking. Try again.", 'ai-msg');
                status.innerText = "System: Error";
            }
        }

        function addMessage(text, type) {
            const chatBox = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
