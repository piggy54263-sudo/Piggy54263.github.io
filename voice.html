<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUMPKIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #050505; color: #ff8800; font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        .back-link { position: fixed; top: 20px; left: 20px; color: #ff8800; text-decoration: none; border: 1px solid #ff8800; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }

        /* JJK NAMEPLATE */
        .jjk-name {
            font-family: 'Rock Salt', cursive;
            font-size: 3.5rem;
            color: #fff;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 3px 3px 0px #ff0000, -2px -2px 0px #000, 0px 0px 20px rgba(255, 0, 0, 0.6);
            transform: rotate(-2deg);
        }

        /* PUMPKIN MODEL */
        .pumpkin-container {
            width: 180px; height: 150px; background: #d45500; border-radius: 50% 50% 45% 45%;
            position: relative; box-shadow: inset -15px -15px 40px #000, 0 0 50px rgba(255,136,0,0.4);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: float 3s infinite ease-in-out;
        }
        .eyes { display: flex; gap: 40px; margin-bottom: 15px; }
        .eye { width: 35px; height: 35px; background: #111; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .mouth { width: 90px; height: 35px; background: #111; clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 80% 70%, 50% 100%, 20% 70%, 0% 100%); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .talking { animation: speak-bounce 0.25s infinite alternate; }
        @keyframes speak-bounce { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* SUBTITLES */
        #subs {
            margin: 20px 0; min-height: 70px; width: 85%; text-align: center;
            color: white; font-size: 1.4rem; font-weight: bold;
            text-shadow: 0 0 10px #ff8800;
        }

        /* INPUT AREA */
        .input-bar { 
            width: 90%; max-width: 500px; display: flex; gap: 10px; 
            background: #111; padding: 10px; border-radius: 50px; border: 2px solid #ff8800; 
        }
        #userInput { background: none; border: none; color: white; flex: 1; padding: 10px; outline: none; font-size: 1.1rem; }
        .send-btn { background: #ff8800; border: none; color: #000; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <a href="home.html" class="back-link">← EXIT</a>

    <div class="jjk-name">PUMPKIN</div>

    <div class="pumpkin-container" id="pumpkin">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <div id="subs">Interface Ready...</div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Talk to Pumpkin..." autocomplete="off">
        <button class="send-btn" onclick="ask()">SEND</button>
    </div>

    <script>
        const pumpkin = document.getElementById('pumpkin');
        const subs = document.getElementById('subs');
        const input = document.getElementById('userInput');
        let API_KEY = localStorage.getItem("groq_key") || "";

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") ask(); });

        async function ask() {
            const text = input.value.trim();
            if(!text) return;
            input.value = "";
            subs.innerText = "...";

            if(!API_KEY) {
                API_KEY = prompt("Enter Groq Key:");
                localStorage.setItem("groq_key", API_KEY);
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ 
                            role: "system", 
                            content: "You are Pumpkin, a male AI character. Your personality is exactly like Rudi. You are cool, calm, and use slang like 'BOIII' and 'cracked'. NEVER use feminine slang like 'yass' or 'slay'. Keep it short." 
                        }, { role: "user", content: text }]
                    })
                });
                const data = await response.json();
                speak(data.choices[0].message.content);
            } catch (err) { subs.innerText = "Error, BOIII."; }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            
            msg.onstart = () => {
                pumpkin.classList.add('talking');
                subs.innerText = text;
            };
            msg.onend = () => pumpkin.classList.remove('talking');

            // --- THE RUDI VOICE SETTINGS ---
            msg.pitch = 0.95; // Slightly deeper, more mature tone
            msg.rate = 1.05;  // Slightly faster for a more natural, non-robotic flow
            
            const voices = window.speechSynthesis.getVoices();
            
            // Priority list for finding a high-quality "Rudi" voice
            const rudiVoice = voices.find(v => v.name.includes("Google US English Male")) || 
                              voices.find(v => v.name.includes("Microsoft David")) || 
                              voices.find(v => v.name.includes("Male") && !v.name.includes("Female")) ||
                              voices[0];

            msg.voice = rudiVoice;
            window.speechSynthesis.speak(msg);
        }

        // Pre-warm the voices
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
