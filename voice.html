<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumpkin AI | Rudi Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #050505; color: #ff8800; font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        .back-link { position: fixed; top: 20px; left: 20px; color: #ff8800; text-decoration: none; border: 1px solid #ff8800; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; z-index: 100; }

        /* JUJUTSU KAISEN STYLE NAMEPLATE */
        .jjk-name-container {
            position: relative;
            margin-bottom: 25px;
            transform: rotate(-1deg);
        }
        .name-tag {
            font-family: 'Rock Salt', cursive;
            font-size: 3.5rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -2px;
            /* Layered shadow for that JJK logo look */
            text-shadow: 
                3px 3px 0px #ff0000, 
                -2px -2px 0px #000,
                0px 0px 15px rgba(255, 0, 0, 0.7);
        }

        /* THE PUMPKIN */
        .pumpkin-main {
            width: 180px; height: 160px; background: #d45500; border-radius: 50% 50% 45% 45%;
            position: relative; box-shadow: inset -10px -10px 30px #000, 0 0 40px rgba(255,136,0,0.4);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: hover 3s infinite ease-in-out;
        }
        .eyes-row { display: flex; gap: 45px; margin-bottom: 15px; }
        .eye-tri { width: 35px; height: 35px; background: #111; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .mouth-carve { width: 90px; height: 35px; background: #111; clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 80% 70%, 50% 100%, 20% 70%, 0% 100%); }

        @keyframes hover { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .speaking { animation: bounce 0.3s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* SUBTITLES */
        #subs-container {
            margin: 20px 0; min-height: 80px; width: 85%; text-align: center;
            color: #ffffff; font-size: 1.3rem; text-shadow: 0 0 12px #ff8800;
            font-weight: bold;
        }

        /* INPUT AREA */
        .input-area { 
            width: 90%; max-width: 550px; display: flex; gap: 12px; 
            background: #111; padding: 12px; border-radius: 60px; border: 2px solid #ff8800; 
        }
        #textInput { background: none; border: none; color: white; flex: 1; padding: 12px; outline: none; font-size: 1.1rem; }
        .send-btn { background: #ff8800; border: none; color: #000; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <a href="home.html" class="back-link">← HUB</a>

    <div class="jjk-name-container">
        <div class="name-tag">PUMPKIN</div>
    </div>

    <div class="pumpkin-main" id="pumpkinBody">
        <div class="eyes-row">
            <div class="eye-tri"></div>
            <div class="eye-tri"></div>
        </div>
        <div class="mouth-carve" id="mouth"></div>
    </div>

    <div id="subs-container">Awaiting interaction...</div>

    <div class="input-area">
        <input type="text" id="textInput" placeholder="Message Pumpkin..." autocomplete="off">
        <button class="send-btn" onclick="askPumpkin()">SEND</button>
    </div>

    <script>
        const pumpkin = document.getElementById('pumpkinBody');
        const subs = document.getElementById('subs-container');
        const input = document.getElementById('textInput');
        let KEY = localStorage.getItem("groq_key") || "";

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") askPumpkin(); });

        async function askPumpkin() {
            const query = input.value.trim();
            if(!query) return;
            input.value = "";
            subs.innerText = "Processing...";

            if(!KEY) {
                KEY = prompt("Enter Groq Key:");
                localStorage.setItem("groq_key", KEY);
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: "You are Pumpkin, a clear-voiced male AI like Rudi. Be cool, use slang like BOIII, and keep it brief." }, { role: "user", content: query }]
                    })
                });
                const data = await response.json();
                speak(data.choices[0].message.content);
            } catch (err) { subs.innerText = "Connection lost, boii."; }
        }

        function speak(text) {
            window.speechSynthesis.cancel(); 
            const utter = new SpeechSynthesisUtterance(text);
            
            utter.onstart = () => {
                pumpkin.classList.add('speaking');
                subs.innerText = text;
            };
            utter.onend = () => pumpkin.classList.remove('speaking');

            // Rudi / Rudi's Brother settings: Clear, Natural, Neutral
            utter.pitch = 1.0; 
            utter.rate = 1.0; 
            
            const voices = window.speechSynthesis.getVoices();
            
            // Logic to find the best "Rudi" style voice (High Quality Male)
            const rudiVoice = voices.find(v => 
                (v.name.includes("Google US English Male") || 
                 v.name.includes("Microsoft Guy") || 
                 v.name.includes("Male")) && 
                !v.name.includes("Robotic")
            ) || voices[0];

            utter.voice = rudiVoice;
            window.speechSynthesis.speak(utter);
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
