<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumpkin AI | Voice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #0a0a0a; 
            color: #ff8800; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        /* BACK BUTTON */
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255, 136, 0, 0.1); border: 1px solid #ff8800; color: #ff8800;
            text-decoration: none; padding: 10px 20px; border-radius: 30px;
            font-size: 0.8rem; font-weight: bold; z-index: 100; transition: 0.3s;
        }
        .back-btn:hover { background: #ff8800; color: #000; box-shadow: 0 0 20px #ff8800; }

        /* 3D STAGE */
        .stage { width: 300px; height: 300px; perspective: 1000px; display: flex; justify-content: center; align-items: center; }
        
        .pumpkin-container {
            width: 200px; height: 200px; position: relative;
            transform-style: preserve-3d;
            animation: float 4s infinite ease-in-out;
        }

        /* THE PUMPKIN BODY */
        .pumpkin-sphere {
            position: absolute; width: 200px; height: 180px;
            background: radial-gradient(circle at 30% 30%, #ffaa33, #cc5500);
            border-radius: 50% 50% 45% 45%;
            box-shadow: inset -10px -10px 50px rgba(0,0,0,0.6), 0 0 40px rgba(255,136,0,0.3);
        }

        /* CARVED FACE */
        .face {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateZ(100px); /* Brings face to front */
        }
        .eyes { display: flex; gap: 50px; margin-bottom: 10px; }
        .eye { 
            width: 40px; height: 40px; background: #111; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); 
            box-shadow: 0 0 15px #ffcc00; 
        }
        .mouth { 
            width: 100px; height: 40px; background: #111; 
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 80% 70%, 50% 100%, 20% 70%, 0% 100%);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ANIMATIONS */
        @keyframes float { 0%, 100% { transform: translateY(0) rotateY(-10deg); } 50% { transform: translateY(-20px) rotateY(10deg); } }
        .talking .mouth { transform: scaleY(1.5); }

        /* UI ELEMENTS */
        #status-text { margin-top: 30px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        #transcript { color: #888; font-size: 0.9rem; margin-top: 10px; max-width: 80%; text-align: center; height: 1.2em; }

        .controls { margin-top: 40px; }
        .mic-trigger {
            width: 70px; height: 70px; border-radius: 50%; border: none;
            background: #ff8800; color: #000; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 0 20px rgba(255,136,0,0.5); transition: 0.3s;
        }
        .mic-trigger:hover { transform: scale(1.1); box-shadow: 0 0 40px #ff8800; }
        .mic-trigger.listening { background: #ff4400; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> EXIT COSMOS</a>

    <div class="stage">
        <div class="pumpkin-container" id="pumpkin">
            <div class="pumpkin-sphere"></div>
            <div class="face">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth" id="mouth"></div>
            </div>
        </div>
    </div>

    <div id="status-text">Pumpkin AI Offline</div>
    <div id="transcript">Click the mic to speak...</div>

    <div class="controls">
        <button class="mic-trigger" id="micBtn" onclick="toggleMic()">
            <i class="fa-solid fa-microphone"></i>
        </button>
    </div>

    <script>
        const statusEl = document.getElementById('status-text');
        const transcriptEl = document.getElementById('transcript');
        const micBtn = document.getElementById('micBtn');
        const pumpkin = document.getElementById('pumpkin');
        
        let GROQ_KEY = localStorage.getItem("groq_key") || "";

        // VOICE RECOGNITION SETUP
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        const synth = window.speechSynthesis;

        if (recognition) {
            recognition.continuous = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                statusEl.innerText = "Pumpkin is Listening...";
                micBtn.classList.add('listening');
            };

            recognition.onresult = async (event) => {
                const text = event.results[0][0].transcript;
                transcriptEl.innerText = `"${text}"`;
                micBtn.classList.remove('listening');
                statusEl.innerText = "Pumpkin is Thinking...";
                
                const response = await getPumpkinResponse(text);
                speak(response);
            };

            recognition.onerror = () => {
                statusEl.innerText = "Error: Try again.";
                micBtn.classList.remove('listening');
            };
        }

        async function getPumpkinResponse(input) {
            if (!GROQ_KEY) {
                GROQ_KEY = prompt("Enter Groq API Key:");
                localStorage.setItem("groq_key", GROQ_KEY);
            }
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are Pumpkin AI. Use brainrot slang like BOIII, cracked, and standing on business. Keep answers short for voice." },
                            { role: "user", content: input }
                        ]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } catch (e) { return "Key is cooked, BOIII. Check your Groq key."; }
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.onstart = () => {
                pumpkin.classList.add('talking');
                statusEl.innerText = "Pumpkin is Speaking";
                transcriptEl.innerText = text;
            };
            utter.onend = () => {
                pumpkin.classList.remove('talking');
                statusEl.innerText = "Pumpkin is Ready";
            };
            
            // Give him a deeper "Pumpkin" voice
            utter.pitch = 0.7; 
            utter.rate = 1;
            synth.speak(utter);
        }

        function toggleMic() {
            if (!recognition) {
                alert("Voice not supported in this browser.");
                return;
            }
            recognition.start();
        }
    </script>
</body>
</html>
