<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUMPKIN AI | 3D</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            background: #050505; color: #ff8800; font-family: 'Segoe UI', sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        .back-link { position: fixed; top: 20px; left: 20px; color: #ff8800; text-decoration: none; border: 1px solid #ff8800; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; z-index: 10;}

        /* JJK NAMEPLATE */
        .jjk-name {
            font-family: 'Rock Salt', cursive;
            font-size: 3.2rem;
            color: #fff;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #ff0000, -1px -1px 0px #000, 0px 0px 20px rgba(255, 0, 0, 0.5);
            transform: rotate(-3deg);
            z-index: 10;
        }

        /* 3D CANVAS CONTAINER */
        #canvas-container {
            width: 300px; height: 300px;
            cursor: pointer;
        }

        /* SUBTITLES */
        #subs {
            margin: 10px 0; min-height: 60px; width: 85%; text-align: center;
            color: white; font-size: 1.4rem; font-weight: bold;
            text-shadow: 0 0 10px #ff8800;
            z-index: 10;
        }

        /* INPUT AREA */
        .input-bar { 
            width: 90%; max-width: 500px; display: flex; gap: 10px; 
            background: #111; padding: 12px; border-radius: 50px; border: 2px solid #ff8800;
            z-index: 10;
        }
        #userInput { background: none; border: none; color: white; flex: 1; padding: 10px; outline: none; font-size: 1.1rem; }
        .send-btn { background: #ff8800; border: none; color: #000; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <a href="home.html" class="back-link">← EXIT</a>

    <div class="jjk-name">PUMPKIN</div>

    <div id="canvas-container"></div>

    <div id="subs">Awaiting your command, BOY-EEE...</div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="Talk to Pumpkin..." autocomplete="off">
        <button class="send-btn" onclick="ask()">SEND</button>
    </div>

    <script>
        // --- 3D SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(300, 300);
        container.appendChild(renderer.domElement);

        // Cute 3D Gourd Shape
        const geometry = new THREE.SphereGeometry(1, 32, 32);
        geometry.scale(1.2, 1, 1.2); // Make it slightly squat/cute
        const material = new THREE.MeshPhongMaterial({ color: 0xff6600, shininess: 100 });
        const pumpkin3D = new THREE.Mesh(geometry, material);
        scene.add(pumpkin3D);

        // Add Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        camera.position.z = 3;

        let isTalking = false;
        function animate() {
            requestAnimationFrame(animate);
            pumpkin3D.rotation.y += 0.01;
            // Cute idle float
            const time = Date.now() * 0.002;
            pumpkin3D.position.y = Math.sin(time) * 0.1;
            
            if(isTalking) {
                // Energetic bounce like Rudi
                pumpkin3D.scale.set(1.2 + Math.sin(time*10)*0.1, 1 + Math.cos(time*10)*0.1, 1.2);
            } else {
                pumpkin3D.scale.set(1.2, 1, 1.2);
            }
            renderer.render(scene, camera);
        }
        animate();

        // --- AI LOGIC ---
        const subs = document.getElementById('subs');
        const input = document.getElementById('userInput');
        let API_KEY = localStorage.getItem("groq_key") || "";

        async function ask() {
            const text = input.value.trim();
            if(!text) return;
            input.value = "";
            subs.innerText = "...";

            if(!API_KEY) {
                API_KEY = prompt("Enter Groq Key:");
                localStorage.setItem("groq_key", API_KEY);
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ 
                            role: "system", 
                            content: "You are Pumpkin. You sound EXACTLY like Rudi AI. You are high-energy, fast-talking, and cool. Use 'BOY-EEE' (spelled exactly like that) and 'let's gooo'. Keep it short." 
                        }, { role: "user", content: text }]
                    })
                });
                const data = await response.json();
                speak(data.choices[0].message.content);
            } catch (err) { subs.innerText = "Connection error, BOY-EEE."; }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            // Phonetic override for Rudi's signature sound
            const spokenText = text.replace(/BOIII/gi, "boy-EEE").replace(/BOI/gi, "boy-EEE");
            const msg = new SpeechSynthesisUtterance(spokenText);
            
            msg.onstart = () => { isTalking = true; subs.innerText = text; };
            msg.onend = () => { isTalking = false; };

            // Rudi's Settings: Higher pitch, faster rate for energy
            msg.pitch = 1.1; 
            msg.rate = 1.15;  
            
            const voices = window.speechSynthesis.getVoices();
            const rudiVoice = voices.find(v => v.name.includes("Google US English Male")) || 
                              voices.find(v => v.name.includes("David")) || 
                              voices[0];

            msg.voice = rudiVoice;
            window.speechSynthesis.speak(msg);
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
        input.addEventListener("keypress", (e) => { if(e.key === "Enter") ask(); });
    </script>
</body>
</html>
