<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumpkin-ai | Voice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #050505; 
            color: #ff8800; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        .back-btn {
            position: fixed; top: 15px; left: 15px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid #ff8800; color: #ff8800;
            text-decoration: none; padding: 8px 15px; border-radius: 8px;
            font-size: 0.7rem; font-weight: bold; z-index: 9999;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .back-btn:hover { background: #ff8800; color: #000; box-shadow: 0 0 15px #ff8800; }

        /* 3D PUMPKIN MODEL */
        .stage { width: 200px; height: 200px; perspective: 600px; margin-bottom: 50px; }
        
        .pumpkin {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }

        .sphere {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #ff9900, #cc5500);
            border-radius: 50% / 60% 60% 40% 40%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 0 30px rgba(255,136,0,0.3);
        }

        /* Pumpkin Ribs to give 3D depth */
        .rib { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(0,0,0,0.1); border-radius: 50%; }
        .rib:nth-child(2) { transform: rotateY(45deg); }
        .rib:nth-child(3) { transform: rotateY(90deg); }
        .rib:nth-child(4) { transform: rotateY(135deg); }

        /* The Face */
        .face {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(101px);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .eyes { display: flex; gap: 40px; }
        .eye { width: 30px; height: 30px; background: #000; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); box-shadow: 0 0 10px #ff0000; }
        .mouth { 
            width: 80px; height: 30px; background: #000; 
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 80% 70%, 60% 100%, 40% 70%, 20% 100%, 0% 100%);
            transition: 0.1s;
        }

        /* Animations */
        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        .talking { animation: bounce 0.2s infinite alternate !important; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* STATUS UI */
        #status { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-top: 20px; }
        #subtitles { color: #ccc; font-style: italic; max-width: 80%; text-align: center; margin-top: 10px; min-height: 1.2em; }

        .mic-btn {
            margin-top: 30px; width: 80px; height: 80px; border-radius: 50%;
            background: #ff8800; border: none; color: #000; font-size: 2rem;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px #ff8800;
        }
        .mic-btn:hover { transform: scale(1.1); box-shadow: 0 0 40px #ff8800; }
        .mic-btn.active { background: #ff0000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0px #ff0000; } 100% { box-shadow: 0 0 40px #ff0000; } }
    </style>
</head>
<body>

    <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> COSMOS HUB</a>

    <div class="stage">
        <div class="pumpkin" id="pumpkinModel">
            <div class="sphere"></div>
            <div class="rib"></div>
            <div class="rib"></div>
            <div class="rib"></div>
            <div class="face">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth" id="mouth"></div>
            </div>
        </div>
    </div>

    <div id="status">Ready to Speak</div>
    <div id="subtitles">"Click the mic to talk to Pumpkin"</div>

    <button class="mic-btn" id="micBtn" onclick="startVoice()"><i class="fa-solid fa-microphone"></i></button>

    <script>
        // Settings from your Luke-ai
        let GROQ_KEY = localStorage.getItem("groq_key") || ""; 
        const userStatus = localStorage.getItem("luke_user_status") || "unknown";

        const synth = window.speechSynthesis;
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new Recognition();

        recognition.continuous = false;
        recognition.lang = 'en-US';

        function startVoice() {
            if (!GROQ_KEY) {
                GROQ_KEY = prompt("Enter Groq API Key:");
                localStorage.setItem("groq_key", GROQ_KEY);
            }
            recognition.start();
            document.getElementById('micBtn').classList.add('active');
            document.getElementById('status').innerText = "Listening...";
        }

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('subtitles').innerText = `"${text}"`;
            document.getElementById('micBtn').classList.remove('active');
            document.getElementById('status').innerText = "Processing...";

            // Get AI Response from Groq
            const aiResponse = await getGroqResponse(text);
            speak(aiResponse);
        };

        async function getGroqResponse(userInput) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: `You are Pumpkin-ai. Identification: ${userStatus}. You are a legendary 3D pumpkin. Stay cracked, use slang (BOIII, clutch, standing on business). Keep responses short for voice chat.` },
                            { role: "user", content: userInput }
                        ]
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                return "Connection dropped, boi. Check your key.";
            }
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            const model = document.getElementById('pumpkinModel');
            const mouth = document.getElementById('mouth');

            utter.onstart = () => {
                model.classList.add('talking');
                document.getElementById('status').innerText = "Pumpkin is Speaking";
                document.getElementById('subtitles').innerText = text;
                mouth.style.height = "50px"; // Open mouth
            };

            utter.onend = () => {
                model.classList.remove('talking');
                document.getElementById('status').innerText = "Ready to Speak";
                mouth.style.height = "30px"; // Close mouth
            };

            // Voice selection (Try to find a deep/cool one)
            const voices = synth.getVoices();
            utter.voice = voices.find(v => v.name.includes("Google US English")) || voices[0];
            utter.pitch = 0.8; // Deep pumpkin voice
            utter.rate = 1;

            synth.speak(utter);
        }
    </script>
</body>
</html>
