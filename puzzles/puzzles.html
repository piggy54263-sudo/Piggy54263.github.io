<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzles - Lukeblast</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .back-btn {
            position: fixed; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00d4ff; color: #00d4ff; text-decoration: none;
            padding: 8px 15px; border-radius: 8px; font-size: 0.7rem; font-weight: bold;
            z-index: 9999; display: flex; align-items: center; gap: 8px;
        }

        h2 { color: #00d4ff; letter-spacing: 2px; text-transform: uppercase; margin-top: 60px; font-weight: 200; }

        .score-board { font-size: 1.5rem; margin: 10px 0; color: #fff; text-shadow: 0 0 10px #00d4ff; }

        /* Lukeblast Grid */
        #grid {
            display: grid; grid-template-columns: repeat(8, 45px); grid-template-rows: repeat(8, 45px);
            gap: 4px; background: #111; padding: 10px; border-radius: 12px; border: 2px solid #333;
        }

        .cell { width: 45px; height: 45px; background: #222; border-radius: 6px; transition: 0.1s; cursor: pointer; }
        .cell:hover { background: #333; }
        .cell.filled { background: #00d4ff; box-shadow: inset 0 0 10px rgba(255,255,255,0.5); border: 1px solid #fff; }

        /* Piece Selection Area */
        .piece-dock { display: flex; gap: 20px; margin-top: 30px; justify-content: center; width: 100%; max-width: 400px; }
        
        .piece-container {
            padding: 15px; background: rgba(255,255,255,0.05); border: 2px solid #333;
            border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .piece-container:hover { border-color: #00d4ff; }
        .piece-container.selected { border-color: #fff; background: rgba(0, 212, 255, 0.2); transform: scale(1.1); }

        .mini-grid { display: grid; gap: 2px; }
        .mini-block { width: 18px; height: 18px; background: #00d4ff; border-radius: 3px; }
        .empty-block { width: 18px; height: 18px; }

        p { color: #666; font-size: 0.8rem; margin-top: 15px; }
    </style>
</head>
<body>

    <a href="games.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> BACK TO GAMES</a>

    <h2><i class="fa-solid fa-cube"></i> LUKEBLAST</h2>
    <div class="score-board">SCORE: <span id="score">0</span></div>

    <div id="grid"></div>

    <div class="piece-dock" id="dock"></div>
    <p>Select a piece then click the grid to place it. Clear lines to score!</p>

    <script>
        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const dockEl = document.getElementById('dock');
        
        let score = 0;
        let selectedPiece = null;
        let board = Array(8).fill().map(() => Array(8).fill(0));

        // Piece shapes: [rows][cols]
        const shapes = [
            [[1, 1], [1, 1]], // Square
            [[1, 1, 1]],      // H-Line
            [[1], [1], [1]],  // V-Line
            [[1, 1], [1, 0]], // L-piece
            [[1]],            // Single
            [[1,1,1], [0,1,0]] // T-piece
        ];

        function initGrid() {
            gridEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (board[r][c] ? ' filled' : '');
                    cell.onclick = () => tryPlace(r, c);
                    gridEl.appendChild(cell);
                }
            }
        }

        function spawnPieces() {
            dockEl.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                const container = document.createElement('div');
                container.className = 'piece-container';
                container.onclick = () => {
                    document.querySelectorAll('.piece-container').forEach(c => c.classList.remove('selected'));
                    container.classList.add('selected');
                    selectedPiece = shape;
                };

                const mini = document.createElement('div');
                mini.className = 'mini-grid';
                mini.style.gridTemplateColumns = `repeat(${shape[0].length}, 18px)`;
                
                shape.forEach(row => {
                    row.forEach(cell => {
                        const b = document.createElement('div');
                        b.className = cell ? 'mini-block' : 'empty-block';
                        mini.appendChild(b);
                    });
                });
                container.appendChild(mini);
                dockEl.appendChild(container);
            }
        }

        function tryPlace(r, c) {
            if (!selectedPiece) return;

            // Check boundaries & overlap
            for (let i = 0; i < selectedPiece.length; i++) {
                for (let j = 0; j < selectedPiece[i].length; j++) {
                    if (selectedPiece[i][j]) {
                        if (r + i >= 8 || c + j >= 8 || board[r + i][c + j]) return;
                    }
                }
            }

            // Place
            for (let i = 0; i < selectedPiece.length; i++) {
                for (let j = 0; j < selectedPiece[i].length; j++) {
                    if (selectedPiece[i][j]) board[r + i][c + j] = 1;
                }
            }

            score += 10;
            selectedPiece = null;
            document.querySelector('.selected').remove();
            
            clearFullLines();
            initGrid();
            if (dockEl.children.length === 0) spawnPieces();
        }

        function clearFullLines() {
            let toClearRows = [];
            let toClearCols = [];

            for (let i = 0; i < 8; i++) {
                if (board[i].every(cell => cell === 1)) toClearRows.push(i);
                let colFull = true;
                for (let j = 0; j < 8; j++) if (!board[j][i]) colFull = false;
                if (colFull) toClearCols.push(i);
            }

            toClearRows.forEach(r => board[r] = Array(8).fill(0));
            toClearCols.forEach(c => {
                for (let r = 0; r < 8; r++) board[r][c] = 0;
            });

            if (toClearRows.length > 0 || toClearCols.length > 0) {
                score += (toClearRows.length + toClearCols.length) * 100;
                scoreEl.innerText = score;
            }
        }

        initGrid();
        spawnPieces();
    </script>
</body>
</html>
