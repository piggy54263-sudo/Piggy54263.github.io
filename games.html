<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple T Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #000; color: white;
            font-family: 'Inter', sans-serif; margin: 0; padding: 20px;
        }
        h2 { color: #00d4ff; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .game-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; margin-top: 20px;
        }
        .game-card {
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            border-radius: 8px; padding: 20px; text-align: center;
            cursor: pointer; transition: 0.3s;
        }
        .game-card:hover { border-color: #00d4ff; transform: translateY(-5px); background: rgba(0, 212, 255, 0.1); }
        .game-card i { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        span { font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <h2><i class="fa-solid fa-gamepad"></i> Game Archives</h2>
    <div class="game-grid">
        <a href="https://poki.com" target="_blank" style="text-decoration:none; color:inherit;">
            <div class="game-card">
                <i class="fa-solid fa-rocket"></i>
                <span>Action Games</span>
            </div>
        </a>
        <div class="game-card" onclick="alert('Coming soon, BOIII!')">
            <i class="fa-solid fa-puzzle-piece"></i>
            <span>Puzzles</span>
        </div>
        <div class="game-card" onclick="alert('TUNG TUNG TUNG!')">
            <i class="fa-solid fa-car"></i>
            <span>Racing</span>
        </div>
    </div>
</body>
</html>
