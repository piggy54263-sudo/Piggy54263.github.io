<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .calc { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; width: 250px; }
        #display { width: 100%; height: 50px; background: #000; color: #4ade80; border: 1px solid #444; margin-bottom: 10px; text-align: right; font-size: 24px; padding: 5px; box-sizing: border-box; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; background: #333; border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 18px; }
        button:hover { background: #444; }
        .equal { background: #4ade80; color: black; grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calc">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button onclick="clr()">C</button>
            <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button onclick="press('/')">/</button>
            <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button onclick="press('*')">*</button>
            <button onclick="press('0')">0</button><button onclick="press('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentInput = "";

        function press(num) {
            currentInput += num;
            document.getElementById('display').value = currentInput;
        }

        function clr() {
            currentInput = "";
            document.getElementById('display').value = "";
        }

        function calculate() {
            // THE SECRET CODE CHECK
            if (currentInput === "1029") {
                window.location.href = "secretcalculator.html";
                return;
            }

            try {
                currentInput = eval(currentInput).toString();
                document.getElementById('display').value = currentInput;
            } catch (e) {
                document.getElementById('display').value = "Error";
                currentInput = "";
            }
        }
    </script>
</body>
</html>
